<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Icebreaker Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #111;
      font-family: 'DM Sans', sans-serif;
    }

    /* ── Mosaic grid ─────────────────────────────────────────────────────── */
    #mosaic {
      display: grid;
      grid-template-columns: 3fr 2fr;
      grid-template-rows: 5fr 3fr 1.2fr;
      gap: 10px;
      padding: 10px;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
    }

    /* ── Panel base ──────────────────────────────────────────────────────── */
    .panel {
      --lift: 5px;
      --spring: cubic-bezier(.5, 2.5, .7, .7);
      border-radius: 16px;
      border: none;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-end;
      padding: 28px 32px;
      position: relative;
      overflow: hidden;
      transform: translateY(0);
      box-shadow: 0 var(--lift) 0 0 rgba(0,0,0,0.35);
      transition:
        transform 0.35s var(--spring),
        box-shadow 0.35s var(--spring),
        filter 0.15s ease;
      text-align: left;
    }
    .panel:hover {
      transform: translateY(calc(-1 * var(--lift)));
      box-shadow: 0 calc(var(--lift) * 2) 0 0 rgba(0,0,0,0.35);
      filter: brightness(1.06);
    }
    .panel:active {
      transform: translateY(calc(-1 * var(--lift) / 2));
      transition-duration: 0.08s;
      filter: brightness(0.96);
    }
    .panel.busy {
      pointer-events: none;
      filter: brightness(0.88);
    }

    /* ── Panel colors ────────────────────────────────────────────────────── */
    #skipPanel   { background: #E8383D; grid-row: 1 / 4; grid-column: 1; }
    #askPanel    { background: #1A56E8; grid-row: 1;     grid-column: 2; }
    #submitPanel { background: #E07C00; grid-row: 2;     grid-column: 2; }
    #classicsPanel { background: #18A873; grid-row: 3;   grid-column: 2; }

    /* ── Panel label ─────────────────────────────────────────────────────── */
    .panel-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 6px;
    }
    .panel-title {
      font-size: clamp(20px, 2.4vw, 36px);
      font-weight: 600;
      color: #fff;
      line-height: 1.15;
    }
    #skipPanel .panel-title {
      font-size: clamp(28px, 3.8vw, 56px);
    }
    .count-badge {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      color: #fff;
      font-size: 10px;
      font-weight: 600;
      border-radius: 20px;
      padding: 1px 7px;
      margin-left: 7px;
      vertical-align: middle;
      letter-spacing: 0.04em;
    }
    #classicsPanel .panel-title {
      font-size: clamp(13px, 1.4vw, 20px);
    }

    /* ── Prompt overlay ──────────────────────────────────────────────────── */
    #promptOverlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.72);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 40px;
    }
    #promptOverlay.visible {
      opacity: 1;
      pointer-events: all;
    }
    #promptCard {
      background: #fff;
      border-radius: 20px;
      padding: 52px 60px;
      max-width: 720px;
      width: 100%;
      text-align: center;
      position: relative;
    }
    #promptText {
      font-size: clamp(22px, 3.2vw, 42px);
      font-weight: 500;
      color: #111;
      line-height: 1.3;
      cursor: pointer;
    }
    #promptText:hover::after {
      content: ' ↗';
      font-size: 0.6em;
      opacity: 0.35;
    }
    #copiedHint {
      font-size: 11px;
      letter-spacing: 0.1em;
      color: rgba(0,0,0,0.35);
      text-transform: uppercase;
      margin-top: 16px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    #copiedHint.show { opacity: 1; }

    .ai-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #1A56E8;
      border-radius: 50%;
      margin-left: 6px;
      vertical-align: middle;
      position: relative;
      top: -2px;
    }

    #doneBtn {
      margin-top: 28px;
      display: none;
      background: none;
      border: 1.5px solid rgba(0,0,0,0.18);
      border-radius: 40px;
      padding: 8px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: rgba(0,0,0,0.45);
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #doneBtn.visible { display: inline-block; }
    #doneBtn:hover { color: rgba(0,0,0,0.8); border-color: rgba(0,0,0,0.4); }
    #doneBtn.struck { color: rgba(0,0,0,0.25); border-color: rgba(0,0,0,0.1); pointer-events: none; }

    #closeOverlay {
      position: absolute;
      top: 16px; right: 20px;
      background: none;
      border: none;
      font-size: 22px;
      color: rgba(0,0,0,0.25);
      cursor: pointer;
      line-height: 1;
      transition: color 0.15s;
    }
    #closeOverlay:hover { color: rgba(0,0,0,0.6); }

    /* ── Thinking state ──────────────────────────────────────────────────── */
    #thinkingDots {
      display: none;
      font-size: clamp(22px, 3.2vw, 42px);
      color: rgba(0,0,0,0.3);
      letter-spacing: 0.2em;
    }
    #thinkingDots.visible { display: block; }

    /* ── Submit overlay ──────────────────────────────────────────────────── */
    #submitOverlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    #submitOverlay.open { opacity: 1; pointer-events: all; }
    #submitBox {
      background: #fff;
      border-radius: 18px;
      padding: 40px 44px;
      max-width: 520px;
      width: 90%;
      text-align: center;
    }
    #submitBox h2 {
      font-size: 18px;
      font-weight: 600;
      color: #111;
      margin-bottom: 6px;
    }
    #submitBox p {
      font-size: 13px;
      color: rgba(0,0,0,0.45);
      margin-bottom: 22px;
    }
    #submitInput {
      width: 100%;
      border: 1.5px solid rgba(0,0,0,0.15);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: #111;
      outline: none;
      transition: border-color 0.2s;
    }
    #submitInput:focus { border-color: #E07C00; }
    #submitFeedback {
      font-size: 12px;
      color: rgba(0,0,0,0.4);
      margin-top: 10px;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <!-- Mosaic buttons -->
  <div id="mosaic">
    <button class="panel" id="skipPanel">
      <div class="panel-label">Icebreaker Machine</div>
      <div class="panel-title">Give me a prompt</div>
    </button>
    <button class="panel" id="askPanel">
      <div class="panel-title">Ask Claude</div>
    </button>
    <button class="panel" id="submitPanel">
      <div class="panel-title">Add Prompt<span class="count-badge" id="promptCount" style="display:none"></span></div>
    </button>
    <button class="panel" id="classicsPanel">
      <div class="panel-title">SDG Classics</div>
    </button>
  </div>

  <!-- Prompt overlay -->
  <div id="promptOverlay">
    <div id="promptCard">
      <button id="closeOverlay">×</button>
      <div id="thinkingDots">· · ·</div>
      <div id="promptText"></div>
      <div id="copiedHint">copied</div>
      <button id="doneBtn">✓ done</button>
    </div>
  </div>

  <!-- Submit overlay -->
  <div id="submitOverlay">
    <div id="submitBox">
      <h2>Add a prompt</h2>
      <p>Press Enter to save. It'll show up next time someone hits "Give me a prompt."</p>
      <input id="submitInput" type="text" placeholder="What's something no one knows about you?" maxlength="150" />
      <div id="submitFeedback"></div>
    </div>
  </div>

  <script>
    // ── Hardcoded prompts (SDG Classics pool) ─────────────────────────────

      "Favorite album ever?",

      "Most unusual food you've ever eaten?",

      "First concert?",

      "What's one thing about how you were raised you wish you could've changed?",
      "What's one thing you appreciate about how you were raised?",

      "What's something you tend to notice that others don't?",

      "What's a rule your parents had that you wouldn't maintain?",

      "What's something people assume about you that's wrong?",
      "What skill did you give up on too early?",

      "What's an opinion you've completely changed?",
      "What's something you're irrationally proud of?",
      "What's something you do when no one's watching?",
      "What's something you're weirdly competitive about?",
      "What's something you're saving for a special occasion that never comes?",
      "What's something new you've learned about yourself in the last year?",
      "What's your relationship with silence?",

      "What's a small thing that tells you a lot about a person?",
      "What's something you carry with you everywhere?",
      "What Guinness record could you set?",
      "You have $5 and you're hungry — what do you buy?",

      "Whose filmography would you erase: Julia Roberts, Tom Hanks, Tom Cruise, or Meryl Streep?",

      "What's the most awkward conversation you've ever had?",
      "What's the longest you've gone without sleep?",
      "What's the worst job you've ever had?",
      "Any notable customer service experience (good or bad)?",
      "What genuinely scares you?",
      "What's a noise complaint you've made or received?",
      "What's the most embarrassing thing in your search history?",
      "What are your biggest pet peeves?",
      "Juice or water? (Hawaiian Air style)",
      "What's your Chex Mix recipe?",
      "What's under your bed?",
      "What YouTube or social media rabbit hole have you gone down recently?",
      "What's a brand you've recently discovered that you love?",
      "Most recent non-edible purchase under $20?",
      "Cheapest thing you own that brings you disproportionate joy?",
      "Most expensive thing you own that wasn't worth it?",
      "What's something you own that no one else you know has?",

      "Describe your exercise routine.",
      "One essential travel item?",
      "Top 3 places on your travel wishlist?",
      "Next planned or dream travel destination?",
      "What's a most revisited place from your hometown?",
      "Best thing about where you grew up?",
      "What's a place you've never been but feel drawn to?",
      "Who's a dream client of yours?",
      "What's a small thing that makes your day significantly better?",
      "What's a sound that instantly comforts you?",
      "A sound that instantly annoys you?",
      "What's a compliment you've received that you still think about?",
      "Who was the last person to make you feel truly seen?",
      "What's an inside joke you still laugh at?",
      "What's the last thing that genuinely made you laugh out loud?",
      "What's the last piece of art that moved you?",
      "What's a word you love the sound of?",
      "What word do you always misspell?",
      "What's your most used emoji?",
      "What's the oldest text thread you have?",
      "What's your go-to excuse to leave a party?",
      "What's the strangest dream you can remember?",
      "What does your handwriting say about you?",
      "What's something you do differently than everyone else you know?",
      "What's a movie you thought you'd hate but loved?",
      "What's your most controversial opinion about a popular movie?",
      "What's a skill you have that surprises people?",
      "What's a moment you wish you could relive?",
      "What's something you keep meaning to do but never do?",
      "What's the most you've ever paid for a haircut?",
      "What's the worst haircut you've ever had?",
      "What's something you own that's older than you?",
    ];

    let promptQueue = [];
    const recentPrompts = [];
    function trackRecent(text) {
      recentPrompts.push(text);
      if (recentPrompts.length > 6) recentPrompts.shift();
    }
    function nextPrompt() {
      if (promptQueue.length === 0) promptQueue = [...prompts].sort(() => Math.random() - 0.5);
      return promptQueue.pop();
    }

    // ── State ─────────────────────────────────────────────────────────────
    let busy = false;
    let userPrompts = [];
    let graduatedClassics = [];
    let activeUserPrompt = null;
    let classicsQueue = [];

    const overlay      = document.getElementById('promptOverlay');
    const promptText   = document.getElementById('promptText');
    const thinkingDots = document.getElementById('thinkingDots');
    const doneBtn      = document.getElementById('doneBtn');
    const copiedHint   = document.getElementById('copiedHint');

    function updatePromptCount() {
      const badge = document.getElementById('promptCount');
      if (userPrompts.length > 0) {
        badge.textContent = userPrompts.length;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    async function loadUserPrompts() {
      try {
        const res = await fetch('/api/user-prompts');
        if (res.ok) { const d = await res.json(); userPrompts = d.prompts || []; }
      } catch {}
      updatePromptCount();
    }
    async function loadGraduatedClassics() {
      try {
        const res = await fetch('/api/classics-prompts');
        if (res.ok) { const d = await res.json(); graduatedClassics = d.prompts || []; }
      } catch {}
    }
    loadUserPrompts();
    loadGraduatedClassics();

    function nextClassic() {
      const pool = [...prompts, ...graduatedClassics];
      if (classicsQueue.length === 0) classicsQueue = [...pool].sort(() => Math.random() - 0.5);
      return classicsQueue.pop();
    }

    function setBusy(val) {
      busy = val;
      ['skipPanel','askPanel','classicsPanel'].forEach(id => {
        document.getElementById(id).classList.toggle('busy', val);
      });
    }

    function openOverlay() { overlay.classList.add('visible'); }
    function closeOverlay() { overlay.classList.remove('visible'); }

    function startThinking() {
      promptText.style.display = 'none';
      thinkingDots.classList.add('visible');
      openOverlay();
    }
    function stopThinking() {
      thinkingDots.classList.remove('visible');
      promptText.style.display = '';
    }

    async function showPrompt(text, isAI = false) {
      doneBtn.classList.remove('visible', 'struck');
      doneBtn.textContent = '✓ done';

      // Quick shuffle
      promptText.style.display = '';
      const delays = [90, 90, 100, 120, 150, 200, 260, 340];
      for (const ms of delays) {
        promptText.textContent = prompts[Math.floor(Math.random() * prompts.length)];
        await new Promise(r => setTimeout(r, ms));
      }
      promptText.textContent = text;
      trackRecent(text);
      if (isAI) {
        const dot = document.createElement('span');
        dot.className = 'ai-dot';
        promptText.appendChild(dot);
      }
    }

    async function generate() {
      if (busy) return;
      setBusy(true);
      startThinking();

      if (userPrompts.length > 0) {
        const pick = userPrompts[Math.floor(Math.random() * userPrompts.length)];
        activeUserPrompt = pick;
        await showPrompt(pick);
        doneBtn.classList.add('visible');
        stopThinking();
        setBusy(false);
        return;
      }

      try {
        const res = await fetch('/api/generate-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recentPrompts }),
        });
        if (!res.ok) throw new Error();
        const { prompt } = await res.json();
        await showPrompt(prompt, true);
      } catch {
        await showPrompt(nextPrompt());
      } finally {
        stopThinking();
        setBusy(false);
      }
    }

    // ── Button wiring ─────────────────────────────────────────────────────
    document.getElementById('skipPanel').addEventListener('click', () => generate());

    document.getElementById('askPanel').addEventListener('click', async () => {
      if (busy) return;
      setBusy(true);
      startThinking();
      try {
        const res = await fetch('/api/generate-prompt', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recentPrompts }),
        });
        if (!res.ok) throw new Error();
        const { prompt } = await res.json();
        await showPrompt(prompt, true);
      } catch {
        await showPrompt(nextPrompt());
      } finally {
        stopThinking();
        setBusy(false);
      }
    });

    document.getElementById('classicsPanel').addEventListener('click', async () => {
      if (busy) return;
      setBusy(true);
      startThinking();
      await showPrompt(nextClassic());
      stopThinking();
      setBusy(false);
    });

    // ── Submit overlay ────────────────────────────────────────────────────
    const submitOverlay  = document.getElementById('submitOverlay');
    const submitInput    = document.getElementById('submitInput');
    const submitFeedback = document.getElementById('submitFeedback');

    document.getElementById('submitPanel').addEventListener('click', () => {
      submitInput.value = '';
      submitFeedback.textContent = '';
      submitOverlay.classList.add('open');
      setTimeout(() => submitInput.focus(), 50);
    });
    submitOverlay.addEventListener('click', e => {
      if (e.target === submitOverlay) submitOverlay.classList.remove('open');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        submitOverlay.classList.remove('open');
        closeOverlay();
      }
    });
    submitInput.addEventListener('keydown', async e => {
      if (e.key !== 'Enter') return;
      const text = submitInput.value.trim();
      if (text.length < 4) { submitFeedback.textContent = 'a bit short...'; return; }
      submitInput.disabled = true;
      submitFeedback.textContent = 'saving...';
      try {
        const res = await fetch('/api/user-prompts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (res.ok) {
          const { count } = await res.json();
          userPrompts.push(text);
          updatePromptCount();
          submitFeedback.textContent = `saved — ${count} prompt${count !== 1 ? 's' : ''} in the pool`;
          setTimeout(() => submitOverlay.classList.remove('open'), 1600);
        } else {
          submitFeedback.textContent = 'something went wrong';
        }
      } catch { submitFeedback.textContent = 'connection error'; }
      submitInput.disabled = false;
    });

    // ── Done button ───────────────────────────────────────────────────────
    doneBtn.addEventListener('click', async () => {
      if (!activeUserPrompt) return;
      const text = activeUserPrompt;
      activeUserPrompt = null;
      userPrompts = userPrompts.filter(p => p !== text);
      updatePromptCount();
      graduatedClassics.push(text);
      classicsQueue = [];
      doneBtn.classList.add('struck');
      doneBtn.textContent = '✓ moved to classics';
      setTimeout(() => {
        doneBtn.classList.remove('visible', 'struck');
        doneBtn.textContent = '✓ done';
      }, 1400);
      fetch('/api/user-prompts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'remove', text }),
      }).catch(() => {});
      fetch('/api/classics-prompts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      }).catch(() => {});
    });

    // ── Prompt card interactions ───────────────────────────────────────────
    document.getElementById('closeOverlay').addEventListener('click', closeOverlay);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeOverlay(); });

    promptText.addEventListener('click', () => {
      const text = promptText.textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        copiedHint.classList.add('show');
        setTimeout(() => copiedHint.classList.remove('show'), 1400);
      });
    });
  </script>
</body>
</html>
