  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f5f1ea;
    }

    /* Video frame — positioned and sized by JS each generation */
    .art-wrap {
      position: fixed;
      opacity: 0;
      overflow: hidden;
      transition: opacity 1.2s ease;
    }
    .art-wrap.visible { opacity: 1; }
    #bgVideo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Floating prompt text */
    #promptInner {
      position: fixed;
      mix-blend-mode: difference;
      pointer-events: none;
    }

    .prompt-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 43px;
      font-weight: 300;
      color: #fff;
      text-align: center;
      line-height: 1.4;
      letter-spacing: -0.02em;
      opacity: 0;
      transition: opacity 1s ease 0.3s;
      pointer-events: all;
      cursor: pointer;
    }
    .prompt-text.visible { opacity: 1; }
    .prompt-text:hover { opacity: 0.7; }

    .copied-hint {
      font-family: 'Special Elite', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.14em;
      margin-top: 14px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      text-align: center;
    }
    .copied-hint.show { opacity: 1; }

    /* Floating circle button — positioned entirely by JS */
    .float-btn {
      position: fixed;
      width: 148px;
      height: 148px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.45);
      background: none;
      color: rgba(255,255,255,0.6);
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 0.01em;
      text-transform: lowercase;
      cursor: grab;
      mix-blend-mode: difference;
      transition: color 0.3s, border-color 0.3s;
      line-height: 1.7;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      user-select: none;
    }
    .float-btn:active { cursor: grabbing; }
    .float-btn:hover { color: #fff; border-color: rgba(255,255,255,0.8); }
    .float-btn:disabled { cursor: grab; }

    /* Slingshot rubber band canvas */
    #slingshotCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      mix-blend-mode: difference;
      z-index: 10;
    }
  </style>

    function randomVideoFrame() {
      const w = 28 + Math.random() * 58;   // 28–86vw
      const h = 22 + Math.random() * 62;   // 22–84vh
      const maxLeft = 95 - w;
      const left = -8 + Math.random() * (maxLeft + 12);
      const maxTop = 95 - h;
      const top  = -4 + Math.random() * (maxTop + 12);

      const roll = Math.random();
      let br;
      if      (roll < 0.20) br = '0px';
      else if (roll < 0.42) br = `${4 + Math.floor(Math.random() * 24)}px`;
      else if (roll < 0.58) br = '50%';

      else {

        br = `${r()} ${r()} ${r()} ${r()}`;
      }
      return { w: `${w}vw`, h: `${h}vh`, top: `${top}vh`, left: `${left}vw`, br };
    }

    // ── Font / layout style ───────────────────────────────────────────────────
    function applyStyle() {
      const F = FONTS[Math.floor(Math.random() * FONTS.length)];

    // ── Physics ───────────────────────────────────────────────────────────────
    const BTN_R = 74;
    const GRAVITY = 0.18;
    const BOUNCE_DAMP = 0.62;
    const FLOOR_SETTLE = 0.8;

    let pBtn = null, pTxt = null, pCup = null, physRaf = null;

    // Flick state
    let dragging = false;
    let lastDragX = 0, lastDragY = 0;
    let velHistory = [];
    let scored = false;  // debounce cup detection

    function physicsInit() {
      const W = window.innerWidth, H = window.innerHeight;
      pBtn = {
        x: W * 0.5,
        y: H - BTN_R - 10,
        vx: 0, vy: 0,
        r: BTN_R
      };
      const a2 = Math.random() * Math.PI * 2;
      const spd = 1.6;
      pTxt = {
        x: W * (0.2 + Math.random() * 0.6),
        y: H * (0.2 + Math.random() * 0.5),
        vx: Math.cos(a2) * spd, vy: Math.sin(a2) * spd,
        r: 120
      };
      // Cup: upper portion of screen, never where the button starts
      const cupW = BTN_R * 2.4;   // inner opening width
      const cupH = BTN_R * 1.3;   // depth
      const margin = 80;
      pCup = {
        x: margin + cupW/2 + Math.random() * (W - margin*2 - cupW),
        y: H * (0.12 + Math.random() * 0.28),   // upper 12–40% of screen
        w: cupW,
        h: cupH
      };
      scored = false;
      if (physRaf) cancelAnimationFrame(physRaf);
      physicsLoop();
    }

    function updateTxtRadius() {
      const rect = document.getElementById('promptInner').getBoundingClientRect();
      if (pTxt && rect.width > 10) {
        pTxt.r = Math.sqrt(rect.width * rect.width + rect.height * rect.height) * 0.45;
      }
    }

    function physicsLoop() {
      const W = window.innerWidth, H = window.innerHeight;
      if (!pBtn || !pTxt) { physRaf = requestAnimationFrame(physicsLoop); return; }

      if (!dragging) {
        // Gravity on button
        pBtn.vy += GRAVITY;
        pBtn.x += pBtn.vx;
        pBtn.y += pBtn.vy;

        // Wall bounce — button (with damping)
        if (pBtn.x - pBtn.r < 0)  { pBtn.x = pBtn.r;      pBtn.vx =  Math.abs(pBtn.vx) * BOUNCE_DAMP; }
        if (pBtn.x + pBtn.r > W)  { pBtn.x = W - pBtn.r;  pBtn.vx = -Math.abs(pBtn.vx) * BOUNCE_DAMP; }
        if (pBtn.y - pBtn.r < 0)  { pBtn.y = pBtn.r;      pBtn.vy =  Math.abs(pBtn.vy) * BOUNCE_DAMP; }
        if (pBtn.y + pBtn.r > H)  {
          pBtn.y = H - pBtn.r;
          pBtn.vy = -Math.abs(pBtn.vy) * BOUNCE_DAMP;
          pBtn.vx *= FLOOR_SETTLE;
          if (Math.abs(pBtn.vy) < 1.2) pBtn.vy = 0;   // settle
          if (Math.abs(pBtn.vx) < 0.3) pBtn.vx = 0;
        }
      }

      // Text blob — no gravity, free float
      pTxt.x += pTxt.vx; pTxt.y += pTxt.vy;
      const txtEl = document.getElementById('promptText');
      if (txtEl.classList.contains('visible')) {
        if (pTxt.x - pTxt.r < 0)  { pTxt.x = pTxt.r;      pTxt.vx =  Math.abs(pTxt.vx); }
        if (pTxt.x + pTxt.r > W)  { pTxt.x = W - pTxt.r;  pTxt.vx = -Math.abs(pTxt.vx); }
        if (pTxt.y - pTxt.r < 0)  { pTxt.y = pTxt.r;      pTxt.vy =  Math.abs(pTxt.vy); }
        if (pTxt.y + pTxt.r > H)  { pTxt.y = H - pTxt.r;  pTxt.vy = -Math.abs(pTxt.vy); }
      }

      // Circle-circle collision (button vs text)
      const dx = pTxt.x - pBtn.x, dy = pTxt.y - pBtn.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const minD = pBtn.r + pTxt.r;
      if (!dragging && dist < minD && dist > 0.01) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = minD - dist;
        pBtn.x -= nx * overlap * 0.5;  pBtn.y -= ny * overlap * 0.5;
        pTxt.x += nx * overlap * 0.5;  pTxt.y += ny * overlap * 0.5;
        const dot = (pTxt.vx - pBtn.vx) * nx + (pTxt.vy - pBtn.vy) * ny;
        if (dot < 0) {
          pBtn.vx += dot * nx * BOUNCE_DAMP; pBtn.vy += dot * ny * BOUNCE_DAMP;
          pTxt.vx -= dot * nx;              pTxt.vy -= dot * ny;
        }
      }

      // Cup collision — button must enter from above with downward velocity
      if (!scored && !dragging && !busy && pCup) {
        const inX = Math.abs(pBtn.x - pCup.x) < (pCup.w / 2 - BTN_R * 0.15);
        const inY = pBtn.y > pCup.y && pBtn.y < pCup.y + pCup.h + BTN_R;
        if (inX && inY && pBtn.vy > 1.5) {
          scored = true;
          pBtn.vx = 0; pBtn.vy = 0;
          pBtn.x = pCup.x;
          pBtn.y = pCup.y + BTN_R + 6;
          generate();
          // pop back out after a beat
          setTimeout(() => {
            scored = false;
            pBtn.vy = -(8 + Math.random() * 4);
            pBtn.vx = (Math.random() - 0.5) * 5;
          }, 600);
        }
      }

      // Apply positions to DOM
      const btnEl = document.getElementById('genBtn');
      btnEl.style.left = (pBtn.x - pBtn.r) + 'px';
      btnEl.style.top  = (pBtn.y - pBtn.r) + 'px';

      const inner = document.getElementById('promptInner');
      const tw = txtEl.offsetWidth || 200, th = txtEl.offsetHeight || 60;
      inner.style.left = (pTxt.x - tw * 0.5) + 'px';
      inner.style.top  = (pTxt.y - th * 0.5) + 'px';

      // Draw power arc + cup
      drawSling();

      physRaf = requestAnimationFrame(physicsLoop);
    }

    // ── Flick / power-arc ────────────────────────────────────────────────────
    function flickSpeed() {
      if (velHistory.length < 2) return 0;
      const win = velHistory.filter(v => Date.now() - v.t < 80);
      if (win.length < 2) return 0;
      const f = win[0], l = win[win.length - 1];
      const dt = (l.t - f.t) / 16;
      if (dt <= 0) return 0;
      const dx = l.x - f.x, dy = l.y - f.y;
      return Math.sqrt(dx*dx + dy*dy) / dt;
    }

    function drawSling() {
      const cvs = document.getElementById('slingshotCanvas');
      const ctx = cvs.getContext('2d');
      cvs.width = window.innerWidth;
      cvs.height = window.innerHeight;
      ctx.clearRect(0, 0, cvs.width, cvs.height);

      // ── Draw cup ────────────────────────────────────────────────────────────
      if (pCup && pBtn) {
        const { x, y, w, h } = pCup;
        // Proximity glow: button near cup = brighter
        const dx = pBtn.x - x, dy = pBtn.y - y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const nearGlow = Math.max(0, 1 - dist / (BTN_R * 5));
        const alpha = 0.28 + nearGlow * 0.45;
        const rimExtra = 14;  // small horizontal wings on the rim

        ctx.save();
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = scored ? 2 : 1.5;

        // Left rim wing
        ctx.beginPath();
        ctx.moveTo(x - w/2 - rimExtra, y);
        ctx.lineTo(x - w/2, y);
        // Left wall down
        ctx.lineTo(x - w/2, y + h);
        // Curved bottom
        ctx.quadraticCurveTo(x, y + h + h * 0.35, x + w/2, y + h);
        // Right wall up
        ctx.lineTo(x + w/2, y);
        // Right rim wing
        ctx.lineTo(x + w/2 + rimExtra, y);
        ctx.stroke();

        // Scored flash
        if (scored) {
          ctx.strokeStyle = `rgba(255,255,255,0.7)`;
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.arc(x, y + h * 0.6, w * 0.28, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.restore();
      }

      // ── Power arc while dragging ─────────────────────────────────────────────
      if (!dragging) return;
      const spd = flickSpeed();
      const MAX = 18;
      const power = Math.min(1, spd / MAX);
      if (power < 0.05) return;

      ctx.save();
      ctx.strokeStyle = `rgba(255,255,255,${0.25 + power * 0.45})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(pBtn.x, pBtn.y, BTN_R + 10 + power * 16,
              -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * power);
      ctx.stroke();
      ctx.restore();
    }

    function onDragStart(cx, cy) {
      dragging = true;
      lastDragX = cx; lastDragY = cy;
      velHistory = [];
      pBtn.vx = 0; pBtn.vy = 0;
    }
    function onDragMove(cx, cy) {
      if (!dragging) return;
      pBtn.x += cx - lastDragX;
      pBtn.y += cy - lastDragY;
      lastDragX = cx; lastDragY = cy;
      velHistory.push({ x: cx, y: cy, t: Date.now() });
      if (velHistory.length > 30) velHistory.shift();
    }
    function onDragEnd() {
      if (!dragging) return;
      dragging = false;

      const win = velHistory.filter(v => Date.now() - v.t < 80);
      if (win.length >= 2) {
        const f = win[0], l = win[win.length - 1];
        const dt = (l.t - f.t) / 16;
        if (dt > 0) {
          const rawVx = (l.x - f.x) / dt;
          const rawVy = (l.y - f.y) / dt;
          const spd = Math.sqrt(rawVx*rawVx + rawVy*rawVy);
          const MAX = 22;
          const scale = spd > MAX ? MAX / spd : 1;
          pBtn.vx = rawVx * scale;
          pBtn.vy = rawVy * scale;
          // Generation now triggered only by cup landing, not flick release
        }
      }
      velHistory = [];
    }

    const btnEl = document.getElementById('genBtn');
    btnEl.addEventListener('mousedown',  e => { e.preventDefault(); onDragStart(e.clientX, e.clientY); });
    document.addEventListener('mousemove', e => onDragMove(e.clientX, e.clientY));
    document.addEventListener('mouseup',   () => onDragEnd());
    btnEl.addEventListener('touchstart',  e => { e.preventDefault(); const t = e.touches[0]; onDragStart(t.clientX, t.clientY); }, { passive: false });
    document.addEventListener('touchmove', e => { if (dragging) { e.preventDefault(); const t = e.touches[0]; onDragMove(t.clientX, t.clientY); } }, { passive: false });
    document.addEventListener('touchend',  () => onDragEnd());

    // ── Thinking words ────────────────────────────────────────────────────────
    const THINKING = [
      'pondering', 'ruminating', 'cogitating', 'deliberating',
      'pontificating', 'bamboozling', 'conjuring', 'philosophizing',
      'conspiring', 'noodling', 'marinating', 'extrapolating',
      'divining', 'channeling', 'intuiting', 'scheming',
      'vibing', 'reckoning', 'calculating', 'theorizing'
    ];
    let thinkIdx = 0, thinkTimer = null;

    function startThinking() {
      thinkIdx = Math.floor(Math.random() * THINKING.length);
      const btn = document.getElementById('genBtn');
      const show = () => { btn.innerHTML = THINKING[thinkIdx++ % THINKING.length]; };
      show();
      thinkTimer = setInterval(show, 380);
    }
    function stopThinking() {
      clearInterval(thinkTimer);
      document.getElementById('genBtn').innerHTML = 'question<br>please';
    }

    // ── State ────────────────────────────────────────────────────────────────
    let busy = false;

    async function showPrompt(finalText) {
      const textEl = document.getElementById('promptText');
      const artWrap = document.getElementById('artWrap');

      artWrap.classList.remove('visible');
      textEl.classList.remove('visible');

      const videoPromise = loadVideo();
      await new Promise(r => setTimeout(r, 350));

      // Shuffle phase
      textEl.style.transition = 'none';
      textEl.style.opacity = '1';
      const delays = [100, 100, 110, 120, 140, 170, 210, 260, 330];
      for (const ms of delays) {
        textEl.textContent = prompts[Math.floor(Math.random() * prompts.length)];
        await new Promise(r => setTimeout(r, ms));
      }

      textEl.textContent = finalText;
      applyStyle();
      textEl.style.transition = '';
      textEl.style.opacity = '';

      // Update text physics radius after a frame
      requestAnimationFrame(updateTxtRadius);

      const url = await videoPromise;
      if (url) {
        const frame = randomVideoFrame();
        artWrap.style.width        = frame.w;
        artWrap.style.height       = frame.h;
        artWrap.style.top          = frame.top;
        artWrap.style.left         = frame.left;
        artWrap.style.borderRadius = frame.br;
        bgVideo.src = url;
        bgVideo.load();
        bgVideo.oncanplay = () => { bgVideo.playbackRate = 0.7; };
      }
      void artWrap.offsetHeight;
      artWrap.classList.add('visible');
      textEl.classList.add('visible');
    }

    async function generate() {
      if (busy) return;
      busy = true;
      const btn = document.getElementById('genBtn');
      btn.disabled = true;
      startThinking();
      try {
        const res = await fetch('/api/generate-prompt', { method: 'POST' });
        if (!res.ok) throw new Error();
        const { prompt } = await res.json();
        await showPrompt(prompt);
      } catch {
        const index = Math.floor(Math.random() * prompts.length);
        await showPrompt(prompts[index]);
      } finally {
        busy = false;
        btn.disabled = false;
        stopThinking();
      }
    }

    // Copy to clipboard on prompt click
    document.getElementById('promptText').addEventListener('click', e => {
      e.stopPropagation();
      const text = document.getElementById('promptText').textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const hint = document.getElementById('copiedHint');
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 1400);
      });
    });

    // Spacebar
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        generate();
      }
    });

    // Start physics loop immediately
    physicsInit();
    window.addEventListener('resize', () => {
      // velocities stay, positions will self-correct on next wall bounce
    });
  </script>
</body>
</html>
