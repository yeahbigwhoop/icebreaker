  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f5f1ea;
    }

    /* Video frame — full viewport, behind everything */
    .art-wrap {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      opacity: 0;
      overflow: hidden;
      transition: opacity 1.2s ease;
      z-index: 1;
    }
    .art-wrap.visible { opacity: 1; }
    #bgVideo {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Prompt text — top-left, mix-blend-mode difference, no background */
    #promptInner {
      position: fixed;
      top: 24px;
      left: 24px;
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 15;
      max-width: 55vw;
    }

    .prompt-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 90px;
      font-weight: 400;
      color: #fff;
      text-align: left;
      line-height: 1.15;
      letter-spacing: -0.02em;
      opacity: 0;
      transition: opacity 1s ease 0.3s;
      pointer-events: all;
      cursor: pointer;
    }
    .prompt-text.visible { opacity: 1; }
    .prompt-text:hover { opacity: 0.7; }

    /* AI indicator dot — pulsing when prompt is AI-generated */
    .ai-dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255,255,255,0.9);
      margin-left: 14px;
      vertical-align: middle;
      animation: ai-pulse 2s ease-in-out infinite;
    }
    @keyframes ai-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.5); }
    }

    .copied-hint {
      font-family: 'Special Elite', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.14em;
      margin-top: 14px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
      text-align: center;
    }
    .copied-hint.show { opacity: 1; }

    /* Chicken — draggable ball */
    #chickenImg {
      position: fixed;
      width: 72px;
      height: auto;
      cursor: grab;
      user-select: none;
      pointer-events: all;
      z-index: 20;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.12));
    }
    #chickenImg:active { cursor: grabbing; }
    #chickenImg.disabled { pointer-events: none; opacity: 0.6; }

    /* Bucket split into two layers so chicken appears inside:
       back  = top ~20% of image (rim/opening) — sits behind chicken
       front = bottom ~80% of image (body)     — sits in front of chicken */
    #bucketBack {
      position: fixed;
      width: 160px;
      height: auto;
      pointer-events: none;
      z-index: 6;
    }
    #bucketFront {
      position: fixed;
      width: 160px;
      height: auto;
      pointer-events: none;
      z-index: 22;
    }

    /* Canvas overlay — power arc + barrier line only */
    #slingshotCanvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 25;
      mix-blend-mode: difference;
    }
  </style>

    function applyStyle() {

    // ── Physics ───────────────────────────────────────────────────────────────
    const BTN_R = 74;
    const GRAVITY = 0.30;
    const BOUNCE_DAMP = 0.62;
    const FLOOR_SETTLE = 0.8;

    let pBtn = null, pCup = null, physRaf = null;

    // Flick state
    let dragging = false;
    let lastDragX = 0, lastDragY = 0;
    let velHistory = [];
    let scored = false;
    let freeFall = false;  // true after drag release — barrier transparent until floor hit
    let scoreCount = 0;    // increments each score; bucket speeds up 20% per score
    let cupSpeedMult = 1.0; // eases to 0 on score, back to 1 on re-grab

    const MIN_DROP_HEIGHT = 300; // px above barrier chicken must be lifted to drop through

    function physicsInit() {
      const W = window.innerWidth, H = window.innerHeight;
      // Bucket image is 160×175px. Opening (rim) is ~top 12% of image.
      // We anchor pCup.y to the rim, cupH = inner depth (~80% of image height).
      const bucketImgW = 160;
      const bucketImgH = 175;
      const cupW = bucketImgW * 0.72;          // inner opening (~72% of bucket width)
      const cupH = bucketImgH * 0.75;          // inner depth
      const bucketY = H - bucketImgH - 20;     // image top (bucket sits near bottom)
      const rimOffsetRatio = 0.08;             // rim is 8% down from image top
      pCup = {
        x: W * 0.5,
        y: bucketY + bucketImgH * rimOffsetRatio,   // physics cupTop = bucket rim
        w: cupW, h: cupH,
        phase: Math.random() * Math.PI * 2,
        bucketImgH, bucketImgW, rimOffsetRatio       // store for DOM positioning
      };
      // Spawn chicken so its bottom is in the upper third, fully on screen
      const chEl = document.getElementById('chickenImg');
      const chH = chEl.offsetHeight || 180;
      const barrierYSpawn = H * 0.62;
      // clamp: bottom must be >= chH (fully on screen) and <= barrierYSpawn - 20
      // Spawn at most 180px above barrier so free-fall never reaches DROP_THRESHOLD (14)
      // v = sqrt(2 * 0.18 * 180) ≈ 8.1 < 14 — always bounces on barrier naturally
      const maxFallDist = 180;
      const spawnY = Math.max(chH + 10, barrierYSpawn - maxFallDist);
      pBtn = {
        x: W * (0.25 + Math.random() * 0.5),
        y: spawnY,
        vx: (Math.random() - 0.5) * 3,
        vy: 0,
        r: BTN_R
      };
      scored = false;
      freeFall = false;
      if (physRaf) cancelAnimationFrame(physRaf);
      physicsLoop();
    }

    function physicsLoop() {
      const W = window.innerWidth, H = window.innerHeight;
      if (!pBtn) { physRaf = requestAnimationFrame(physicsLoop); return; }

      // Oscillate cup — eases to a stop on score, eases back in on re-grab
      if (pCup) {
        const targetMult = scored ? 0 : 1;
        cupSpeedMult += (targetMult - cupSpeedMult) * 0.04;
        pCup.phase += 0.014 * Math.pow(1.2, scoreCount) * cupSpeedMult;
        const margin = pCup.bucketImgW / 2 + 30;
        pCup.x = margin + (W - margin * 2) * 0.5 * (1 + Math.sin(pCup.phase));
        // Keep y locked to bottom (window resize resilience)
        pCup.y = H - pCup.bucketImgH * (1 - pCup.rimOffsetRatio) - 20;
      }

      if (!dragging) {
        pBtn.vy += GRAVITY;
        pBtn.x += pBtn.vx;
        pBtn.y += pBtn.vy;

        // pBtn.y = bottom edge of chicken (feet/drumstick tip)
        // Side walls (use half-width for horizontal bounds)
        if (pBtn.x - BTN_R < 0)  { pBtn.x = BTN_R;     pBtn.vx =  Math.abs(pBtn.vx) * BOUNCE_DAMP; }
        if (pBtn.x + BTN_R > W)  { pBtn.x = W - BTN_R; pBtn.vx = -Math.abs(pBtn.vx) * BOUNCE_DAMP; }
        // Ceiling — top of chicken = pBtn.y - chickenH (approximate with 2*BTN_R)
        const chH2 = document.getElementById('chickenImg').offsetHeight || BTN_R * 2;
        if (pBtn.y - chH2 < 0) { pBtn.y = chH2; pBtn.vy = Math.abs(pBtn.vy) * BOUNCE_DAMP; }
        // Floor
        if (pBtn.y > H) {
          pBtn.y = H;
          pBtn.vy = -Math.abs(pBtn.vy) * BOUNCE_DAMP;
          pBtn.vx *= FLOOR_SETTLE;
          if (Math.abs(pBtn.vy) < 1.2) pBtn.vy = 0;
          if (Math.abs(pBtn.vx) < 0.3) pBtn.vx = 0;
          freeFall = false;  // barrier becomes solid again after floor contact
        }

        // ── Barrier ───────────────────────────────────────────────────────────
        // freeFall = true after user releases chicken — barrier stays open until floor hit
        const barrierY = H * 0.62;
        if (!freeFall && pBtn.y > barrierY && pBtn.vy > 0) {
          pBtn.y = barrierY;
          pBtn.vy = -Math.abs(pBtn.vy) * BOUNCE_DAMP;
        }

        // ── Cup physics ───────────────────────────────────────────────────────
        // pBtn.x/y = center/bottom-tip of chicken (collision point = drumstick tip)
        // Only engage when chicken tip is actually below the cup rim level
        if (pCup && !scored) {
          const lw = pCup.x - pCup.w / 2;
          const rw = pCup.x + pCup.w / 2;
          const cupTop = pCup.y;
          const cupBot = pCup.y + pCup.h;
          const tipX   = pBtn.x;   // horizontal center
          const tipY   = pBtn.y;   // bottom tip

          // Exterior left wall — only if tip is in cup's height band and chicken is to the LEFT
          if (tipY > cupTop && tipY < cupBot && tipX < lw && tipX + BTN_R > lw && pBtn.vx > 0) {
            pBtn.x = lw - BTN_R;
            pBtn.vx = -Math.abs(pBtn.vx) * BOUNCE_DAMP;
          }
          // Exterior right wall
          if (tipY > cupTop && tipY < cupBot && tipX > rw && tipX - BTN_R < rw && pBtn.vx < 0) {
            pBtn.x = rw + BTN_R;
            pBtn.vx = Math.abs(pBtn.vx) * BOUNCE_DAMP;
          }
          // Cup floor — tip went below cupBot while inside x range
          if (tipX > lw && tipX < rw && tipY > cupBot && pBtn.vy > 0) {
            pBtn.y = cupBot;
            pBtn.vy = -Math.abs(pBtn.vy) * BOUNCE_DAMP;
            pBtn.vx *= 0.8;
            if (Math.abs(pBtn.vy) < 0.8) pBtn.vy = 0;
            if (Math.abs(pBtn.vx) < 0.2) pBtn.vx = 0;
          }

          // ── Score: tip entered through the opening from above ─────────────
          const inX = tipX > lw && tipX < rw;
          const inY = tipY > cupTop && tipY < cupTop + pCup.h * 0.5;
          if (!busy && inX && inY && pBtn.vy > 2) {
            scored = true;
            scoreCount++;
            pBtn.vx = 0;
            pBtn.vy = 0;
            pBtn.x  = pCup.x;
            generate();
            // chicken stays in bucket until user grabs it again (see onDragStart)
          }
        }

        // While scored — keep chicken inside cup, let it settle on the floor
        if (pCup && scored) {
          const lw = pCup.x - pCup.w / 2;
          const rw = pCup.x + pCup.w / 2;
          const cupBot = pCup.y + pCup.h;
          if (pBtn.y > cupBot && pBtn.vy > 0) {
            pBtn.y = cupBot;
            pBtn.vy = -Math.abs(pBtn.vy) * BOUNCE_DAMP;
            pBtn.vx *= 0.8;
            if (Math.abs(pBtn.vy) < 0.8) pBtn.vy = 0;
          }
          if (pBtn.x < lw + BTN_R) { pBtn.x = lw + BTN_R; pBtn.vx = Math.abs(pBtn.vx) * 0.4; }
          if (pBtn.x > rw - BTN_R) { pBtn.x = rw - BTN_R; pBtn.vx = -Math.abs(pBtn.vx) * 0.4; }
        }
      }

      // Apply positions to DOM
      const chickenEl = document.getElementById('chickenImg');
      const cw = chickenEl.offsetWidth  || BTN_R * 2;
      const ch = chickenEl.offsetHeight || BTN_R * 2;
      chickenEl.style.left = (pBtn.x - cw / 2) + 'px';
      chickenEl.style.top  = (pBtn.y - ch) + 'px';    // bottom of chicken = pBtn.y

      // Bucket: position both layers identically — same src, same coords
      const bucketBackEl  = document.getElementById('bucketBack');
      const bucketFrontEl = document.getElementById('bucketFront');
      const bw = bucketBackEl.offsetWidth  || pCup.bucketImgW;
      const bh = bucketBackEl.offsetHeight || pCup.bucketImgH;
      const bLeft = (pCup.x - bw / 2) + 'px';
      const bTop  = (pCup.y - bh * pCup.rimOffsetRatio) + 'px';
      bucketBackEl.style.left  = bLeft;
      bucketBackEl.style.top   = bTop;
      bucketFrontEl.style.left = bLeft;
      bucketFrontEl.style.top  = bTop;

      drawSling();
      physRaf = requestAnimationFrame(physicsLoop);
    }

    // ── Flick / power-arc ────────────────────────────────────────────────────
    function flickSpeed() {
      if (velHistory.length < 2) return 0;
      const win = velHistory.filter(v => Date.now() - v.t < 80);
      if (win.length < 2) return 0;
      const f = win[0], l = win[win.length - 1];
      const dt = (l.t - f.t) / 16;
      if (dt <= 0) return 0;
      const dx = l.x - f.x, dy = l.y - f.y;
      return Math.sqrt(dx*dx + dy*dy) / dt;
    }

    function drawSling() {
      const cvs = document.getElementById('slingshotCanvas');
      const ctx = cvs.getContext('2d');
      cvs.width = window.innerWidth;
      cvs.height = window.innerHeight;
      ctx.clearRect(0, 0, cvs.width, cvs.height);

      // ── Barrier line — fades as chicken is lifted to MIN_DROP_HEIGHT, gone in freeFall
      const barrierY = cvs.height * 0.62;
      let barrierAlpha = freeFall ? 0 : 0.55;
      if (dragging && pBtn) {
        const ballHeight = barrierY - pBtn.y;          // px above barrier
        const ratio = Math.max(0, Math.min(1, ballHeight / MIN_DROP_HEIGHT));
        barrierAlpha = 0.55 * (1 - ratio);             // 0.55 at ground → 0 at min height
      }
      if (barrierAlpha > 0.005) {
        ctx.save();
        ctx.setLineDash([8, 8]);
        ctx.strokeStyle = `rgba(255,255,255,${barrierAlpha})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, barrierY);
        ctx.lineTo(cvs.width, barrierY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }

      // ── Power arc while dragging ─────────────────────────────────────────────
      if (!dragging) return;
      const spd = flickSpeed();
      const MAX = 18;
      const power = Math.min(1, spd / MAX);
      if (power < 0.05) return;

      ctx.save();
      ctx.strokeStyle = `rgba(255,255,255,${0.25 + power * 0.45})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(pBtn.x, pBtn.y, BTN_R + 10 + power * 16,
              -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * power);
      ctx.stroke();
      ctx.restore();
    }

    function onDragStart(cx, cy) {
      dragging = true;
      freeFall = false;  // re-grab closes the barrier again
      // Release chicken from bucket if it was scored
      if (scored) {
        scored = false;
      }
      lastDragX = cx; lastDragY = cy;
      velHistory = [];
      pBtn.vx = 0; pBtn.vy = 0;
    }
    function onDragMove(cx, cy) {
      if (!dragging) return;
      const barrierY = window.innerHeight * 0.62;
      pBtn.x += cx - lastDragX;
      pBtn.y += cy - lastDragY;
      // Hard barrier — chicken bottom cannot cross the line while dragging
      if (pBtn.y > barrierY) pBtn.y = barrierY;
      lastDragX = cx; lastDragY = cy;
      velHistory.push({ x: cx, y: cy, t: Date.now() });
      if (velHistory.length > 30) velHistory.shift();
    }
    function onDragEnd() {
      if (!dragging) return;
      dragging = false;
      // Only open barrier if chicken was lifted high enough above the line
      const _barrierY = window.innerHeight * 0.62;
      if (pBtn && (_barrierY - pBtn.y) >= MIN_DROP_HEIGHT) {
        freeFall = true;
      }

      const win = velHistory.filter(v => Date.now() - v.t < 80);
      if (win.length >= 2) {
        const f = win[0], l = win[win.length - 1];
        const dt = (l.t - f.t) / 16;
        if (dt > 0) {
          const rawVx = (l.x - f.x) / dt;
          const rawVy = (l.y - f.y) / dt;
          const spd = Math.sqrt(rawVx*rawVx + rawVy*rawVy);
          const MAX = 22;
          const scale = spd > MAX ? MAX / spd : 1;
          pBtn.vx = rawVx * scale;
          pBtn.vy = rawVy * scale;
          // Generation now triggered only by cup landing, not flick release
        }
      }
      velHistory = [];
    }

    const chickenEl = document.getElementById('chickenImg');
    chickenEl.addEventListener('mousedown',  e => { e.preventDefault(); onDragStart(e.clientX, e.clientY); });
    document.addEventListener('mousemove', e => onDragMove(e.clientX, e.clientY));
    document.addEventListener('mouseup',   () => onDragEnd());
    chickenEl.addEventListener('touchstart',  e => { e.preventDefault(); const t = e.touches[0]; onDragStart(t.clientX, t.clientY); }, { passive: false });
    document.addEventListener('touchmove', e => { if (dragging) { e.preventDefault(); const t = e.touches[0]; onDragMove(t.clientX, t.clientY); } }, { passive: false });
    document.addEventListener('touchend',  () => onDragEnd());

    // ── Thinking words ────────────────────────────────────────────────────────
    const THINKING = [
      'pondering', 'ruminating', 'cogitating', 'deliberating',
      'pontificating', 'bamboozling', 'conjuring', 'philosophizing',
      'conspiring', 'noodling', 'marinating', 'extrapolating',
      'divining', 'channeling', 'intuiting', 'scheming',
      'vibing', 'reckoning', 'calculating', 'theorizing'
    ];
    let thinkIdx = 0, thinkTimer = null;

    function startThinking() {
      thinkIdx = Math.floor(Math.random() * THINKING.length);
      const el = document.getElementById('chickenImg');
      el.classList.add('disabled');
      thinkTimer = setInterval(() => { thinkIdx++; }, 380);
    }
    function stopThinking() {
      clearInterval(thinkTimer);
      const el = document.getElementById('chickenImg');
      el.classList.remove('disabled');
    }

    // ── State ────────────────────────────────────────────────────────────────
    let busy = false;

    async function showPrompt(finalText, isAI = false) {
      const textEl = document.getElementById('promptText');
      const artWrap = document.getElementById('artWrap');

      artWrap.classList.remove('visible');
      textEl.classList.remove('visible');

      const videoPromise = loadVideo();
      await new Promise(r => setTimeout(r, 350));

      // Shuffle phase
      textEl.style.transition = 'none';
      textEl.style.opacity = '1';
      const delays = [100, 100, 110, 120, 140, 170, 210, 260, 330];
      for (const ms of delays) {
        textEl.textContent = prompts[Math.floor(Math.random() * prompts.length)];
        await new Promise(r => setTimeout(r, ms));
      }

      textEl.textContent = finalText;
      if (isAI) {
        const dot = document.createElement('span');
        dot.className = 'ai-dot';
        textEl.appendChild(dot);
      }
      // Font stays as the default DM Sans (same as shuffle) — no applyStyle() call
      textEl.style.transition = '';
      textEl.style.opacity = '';

      const url = await videoPromise;
      if (url) {
        bgVideo.src = url;
        bgVideo.load();
        bgVideo.oncanplay = () => { bgVideo.playbackRate = 0.7; };
      }
      void artWrap.offsetHeight;
      artWrap.classList.add('visible');
      textEl.classList.add('visible');
    }

    async function generate() {
      if (busy) return;
      busy = true;
      startThinking();
      try {
        const res = await fetch('/api/generate-prompt', { method: 'POST' });
        if (!res.ok) {
          const txt = await res.text();
          throw new Error(`${res.status}: ${txt}`);
        }
        const { prompt } = await res.json();
        await showPrompt(prompt, true);
      } catch (err) {
        console.error('[icebreaker] API failed, using static list:', err);
        await showPrompt(nextPrompt());
      } finally {
        busy = false;
        stopThinking();
      }
    }

    // Copy to clipboard on prompt click
    document.getElementById('promptText').addEventListener('click', e => {
      e.stopPropagation();
      const text = document.getElementById('promptText').textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const hint = document.getElementById('copiedHint');
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 1400);
      });
    });

    // Spacebar
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        generate();
      }
    });

    // Start physics after chicken image loads so we know its real height
    const _chickenImg = document.getElementById('chickenImg');
    if (_chickenImg.complete) {
      physicsInit();
    } else {
      _chickenImg.addEventListener('load', physicsInit);
    }
    window.addEventListener('resize', () => {
      // Physics velocities stay; positions self-correct on next wall bounce
    });
  </script>
</body>
</html>
