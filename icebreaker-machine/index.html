<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Icebreaker Machine</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f5f1ea;
    }

    /* Full-bleed animation layer */
    .art-wrap {
      position: fixed;
      inset: 0;
      opacity: 0;
      transition: opacity 1.2s ease;
      background: #f5f1ea;
    }
    .art-wrap.visible { opacity: 1; }
    #bgCanvas {
      width: 100%; height: 100%;
      display: block;
    }

    /* UI overlay */
    .ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 48px 44px;
      pointer-events: none;
      mix-blend-mode: difference;
    }

    .title-wrap {
      width: 100%;
      overflow: hidden;
    }
    .title-track {
      display: flex;
      white-space: nowrap;
      animation: marquee 35s linear infinite;
    }
    .title-track span {
      font-family: 'Special Elite', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.32em;
      text-transform: lowercase;
      font-weight: normal;
      padding-right: 7em;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .prompt-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 540px;
      width: 100%;
    }

    .prompt-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 18px;
      font-weight: 300;
      color: #fff;
      text-align: center;
      line-height: 1.75;
      letter-spacing: -0.01em;
      opacity: 0;
      transition: opacity 1s ease 0.3s;
      cursor: pointer;
      pointer-events: all;
    }
    .prompt-text.visible { opacity: 1; }
    .prompt-text:hover { opacity: 0.7; }

    .copied-hint {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.14em;
      margin-top: 14px;
      opacity: 0;
      transition: opacity 0.4s ease;
      pointer-events: none;
    }
    .copied-hint.show { opacity: 1; }

    .bottom-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      pointer-events: all;
    }

    .btn {
      font-family: 'Special Elite', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      background: none;
      border: none;
      border-bottom: 1px solid rgba(255,255,255,0.3);
      padding: 4px 0;
      letter-spacing: 0.2em;
      cursor: pointer;
      text-transform: lowercase;
      transition: color 0.3s, border-color 0.3s;
    }
    .btn:hover { color: #fff; border-color: rgba(255,255,255,0.7); }
    .btn-ai { border-bottom-style: dashed; }
    .btn-ai:disabled { opacity: 0.5; cursor: default; }

    .kbd-hint {
      font-family: 'Inter', sans-serif;
      font-size: 9px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.14em;
      font-weight: 300;
      transition: opacity 1.5s ease;
      user-select: none;
    }
    .kbd-hint.gone { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <div class="art-wrap" id="artWrap">
    <canvas id="bgCanvas"></canvas>
  </div>

  <div class="ui">
    <div class="title-wrap">
      <div class="title-track">
        <span>the icebreaker machine</span>
        <span>the icebreaker machine</span>
        <span>the icebreaker machine</span>
        <span>the icebreaker machine</span>
        <span>the icebreaker machine</span>
        <span>the icebreaker machine</span>
      </div>
    </div>

    <div class="prompt-wrap">
      <div>
        <div class="prompt-text" id="promptText" title="click to copy"></div>
        <div class="copied-hint" id="copiedHint">copied</div>
      </div>
    </div>

    <div class="bottom-row">
      <button class="btn" onclick="generateIcebreaker()">generate icebreaker</button>
      <button class="btn btn-ai" id="aiBtn" onclick="generateAIPrompt()">surprise me (ai)</button>
      <span class="kbd-hint" id="kbdHint">or press space</span>
    </div>
  </div>

  <script>
    // ── Prompts ──────────────────────────────────────────────────────────────

      "Favorite hike?",
      "Most recent item you treated yourself to?",
      "Favorite restaurant right now?",
      "Favorite Trader Joe's item right now?",

      "Favorite Christmas movie?",
      "Favorite album ever?",
      "Movie you've seen the most times?",
      "Favorite snack food when you were little?",
      "Favorite dish your mom or dad makes?",
      "What's your Starbucks order?",
      "Go-to diner order?",
      "Best meal you've ever had?",
      "Most unusual food you've ever eaten?",
      "Strangest thing you've ever eaten?",

      "A food you could eat every day without getting tired of it?",
      "What do you impulse-buy?",
      "What's your go-to karaoke song?",
      "Song you know every single word to?",
      "A TV show you've rewatched more than twice?",
      "What's your sign, and does it describe you?",

      // — past & nostalgia —
      "Who was your first best friend?",

      "What was on the wall of your childhood bedroom?",
      "What would've gotten you into a stranger's van when you were young?",
      "Who was your first celebrity crush?",
      "First memorable gift you received?",
      "First thing you ever collected?",
      "What's your prom story — did you go, skip, or is it complicated?",
      "Most dramatic thing you remember from high school?",
      "Most rebellious thing you did as a teenager?",
      "First concert?",
      "First job?",
      "Who taught you to drive?",

      // — self-reflection —
      "What's one thing about how you were raised you wish you could've changed?",
      "What's one thing you appreciate about how you were raised?",
      "What's something new you've tried lately?",
      "What do you do to relax away from your phone?",
      "What do you fear you'll start doing as you get older?",
      "What's something you tend to notice that others don't?",
      "Did you ever have a nemesis growing up?",
      "What's a dead hobby of yours?",
      "What's a rule your parents had that you wouldn't maintain?",
      "What's something you're really bad at but want to improve?",
      "What's something people assume about you that's wrong?",
      "What skill did you give up on too early?",
      "What's a dream you've almost given up on?",
      "What's an opinion you've completely changed?",
      "What's something you're irrationally proud of?",
      "What's something you do when no one's watching?",
      "What's something you're weirdly competitive about?",
      "What's something you're saving for a special occasion that never comes?",
      "What's something new you've learned about yourself in the last year?",
      "What's your relationship with silence?",
      "Describe your perfect Sunday morning.",
      "What's a small thing that tells you a lot about a person?",
      "What's something you carry with you everywhere?",

      // — hypotheticals & fun —
      "What Guinness record could you set?",
      "You have $5 and you're hungry — what do you buy?",
      "Best looking man and woman ever?",
      "Whose filmography would you erase: Julia Roberts, Tom Hanks, Tom Cruise, or Meryl Streep?",
      "What would your celebrity product be?",
      "What would your green room requests be?",
      "What would your reality TV show be called?",
      "If your life had a theme song right now, what would it be?",
      "What do you think you were in a past life?",
      "What language would you want to be fluent in?",
      "What would you do with an unexpected free day?",
      "What's something people always ask you for advice on?",
      "What's the most you've spent on a single meal?",

      // — confessional & candid —
      "What's your worst traffic infraction?",
      "Describe your worst date.",
      "What's your most embarrassing phase?",
      "What's the worst advice you ever followed?",
      "What's the last thing you lied about?",
      "What's the most amount of money you've spent on something dumb?",
      "What's an app you downloaded and never used?",
      "What's something you've never told your parents?",
      "What's the most awkward conversation you've ever had?",
      "What's the longest you've gone without sleep?",
      "What's the worst job you've ever had?",
      "Any notable customer service experience (good or bad)?",
      "What genuinely scares you?",
      "What's a noise complaint you've made or received?",
      "What's the most embarrassing thing in your search history?",

      // — quirky details —
      "What are your biggest pet peeves?",
      "Juice or water? (Hawaiian Air style)",
      "What's your Chex Mix recipe?",
      "What's under your bed?",
      "What YouTube or social media rabbit hole have you gone down recently?",
      "What's a brand you've recently discovered that you love?",
      "Most recent non-edible purchase under $20?",
      "Cheapest thing you own that brings you disproportionate joy?",
      "Most expensive thing you own that wasn't worth it?",
      "What's something you own that no one else you know has?",
      "What's something you keep meaning to learn but never do?",
      "Describe your exercise routine.",
      "One essential travel item?",
      "Top 3 places on your travel wishlist?",
      "Next planned or dream travel destination?",
      "What's a most revisited place from your hometown?",
      "Best thing about where you grew up?",
      "What's a place you've never been but feel drawn to?",
      "Who's a dream client of yours?",
      "What's a small thing that makes your day significantly better?",
      "What's a sound that instantly comforts you?",
      "A sound that instantly annoys you?",
      "What's a compliment you've received that you still think about?",
      "Who was the last person to make you feel truly seen?",
      "What's an inside joke you still laugh at?",
      "What's the last thing that genuinely made you laugh out loud?",
      "What's the last piece of art that moved you?",
      "What's a word you love the sound of?",
      "What word do you always misspell?",
      "What's your most used emoji?",
      "What's the oldest text thread you have?",
      "What's your go-to excuse to leave a party?",
      "What's the strangest dream you can remember?",
      "What does your handwriting say about you?",
      "What's something you do differently than everyone else you know?",
      "What's a movie you thought you'd hate but loved?",
      "What's your most controversial opinion about a popular movie?",
      "What's a skill you have that surprises people?",
      "What's a moment you wish you could relive?",
      "What's something you keep meaning to do but never do?",
      "What's the most you've ever paid for a haircut?",
      "What's the worst haircut you've ever had?",
      "What's something you own that's older than you?",
    ];

    // ── Canvas animation ──────────────────────────────────────────────────────
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let animId = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const BG = '#f5f1ea';
    const INK = [42, 37, 32];

    function mkRng(seed) {
      let s = (Math.abs(seed) * 1234567 + 1) >>> 0;
      return () => {
        s = (s + 0x6D2B79F5) >>> 0;
        let t = Math.imul(s ^ (s >>> 15), 1 | s);
        t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
        return ((t ^ (t >>> 14)) >>> 0) / 0x100000000;
      };
    }

    // 0 — Drifting particles
    function animDrift(seed) {
      const r = mkRng(seed);
      const W = canvas.width, H = canvas.height;
      const particles = Array.from({length: 140}, () => ({
        x: r() * W, y: r() * H,
        vx: (r() - 0.5) * 0.5, vy: (r() - 0.5) * 0.5,
        size: 0.8 + r() * 3.5,
        op: 0.04 + r() * 0.13,
      }));
      return () => {
        ctx.fillStyle = BG;
        ctx.fillRect(0, 0, W, H);
        for (const p of particles) {
          p.x = (p.x + p.vx + W) % W;
          p.y = (p.y + p.vy + H) % H;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${INK},${p.op})`;
          ctx.fill();
        }
      };
    }

    // 1 — Flow field lines
    function animFlow(seed) {
      const r = mkRng(seed);
      const W = canvas.width, H = canvas.height;
      const freq = 0.004 + r() * 0.005;
      let phase = r() * Math.PI * 2;
      const speed = 0.004 + r() * 0.003;
      const trail = document.createElement('canvas');
      trail.width = W; trail.height = H;
      const tc = trail.getContext('2d');
      tc.fillStyle = BG; tc.fillRect(0, 0, W, H);
      const particles = Array.from({length: 80}, () => ({
        x: r() * W, y: r() * H, age: Math.floor(r() * 180), life: 140 + Math.floor(r() * 160),
      }));
      return () => {
        phase += speed;
        tc.fillStyle = 'rgba(245,241,234,0.018)';
        tc.fillRect(0, 0, W, H);
        for (const p of particles) {
          const angle = Math.sin(p.x * freq + phase) * Math.PI * 2
                      + Math.cos(p.y * freq * 0.8 + phase * 0.6) * Math.PI;
          p.x += Math.cos(angle) * 1.3;
          p.y += Math.sin(angle) * 1.3;
          p.age++;
          if (p.age > p.life || p.x < 0 || p.x > W || p.y < 0 || p.y > H) {
            p.x = r() * W; p.y = r() * H; p.age = 0;
          }
          const fade = Math.min(p.age / 30, 1) * Math.min((p.life - p.age) / 30, 1);
          tc.beginPath();
          tc.arc(p.x, p.y, 0.9, 0, Math.PI * 2);
          tc.fillStyle = `rgba(${INK},${fade * 0.22})`;
          tc.fill();
        }
        ctx.drawImage(trail, 0, 0);
      };
    }

    // 2 — Expanding rings
    function animRings(seed) {
      const r = mkRng(seed);
      const W = canvas.width, H = canvas.height;
      const cx = W * (0.25 + r() * 0.5), cy = H * (0.25 + r() * 0.5);
      const rings = [];
      let ticker = 0;
      const interval = 50 + r() * 50;
      const spd = 0.5 + r() * 0.4;
      const maxR = Math.sqrt(W * W + H * H);
      return () => {
        ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
        if (++ticker > interval) { rings.push({ r: 0, op: 0.15 + r() * 0.1 }); ticker = 0; }
        for (let i = rings.length - 1; i >= 0; i--) {
          rings[i].r += spd;
          const fade = 1 - rings[i].r / maxR;
          ctx.beginPath();
          ctx.arc(cx, cy, rings[i].r, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(${INK},${rings[i].op * fade})`;
          ctx.lineWidth = 0.6;
          ctx.stroke();
          if (rings[i].r > maxR) rings.splice(i, 1);
        }
      };
    }

    // 3 — Slow sine waves
    function animWaves(seed) {
      const r = mkRng(seed);
      const W = canvas.width, H = canvas.height;
      const waves = Array.from({length: 5 + Math.floor(r() * 4)}, () => ({
        y: H * (0.08 + r() * 0.84),
        amp: 12 + r() * 70,
        freq: 0.003 + r() * 0.009,
        phase: r() * Math.PI * 2,
        spd: (0.006 + r() * 0.009) * (r() > 0.5 ? 1 : -1),
        op: 0.07 + r() * 0.11,
        lw: 0.4 + r() * 0.6,
      }));
      return () => {
        ctx.fillStyle = BG; ctx.fillRect(0, 0, W, H);
        for (const w of waves) {
          w.phase += w.spd;
          ctx.beginPath();
          ctx.moveTo(0, w.y + Math.sin(w.phase) * w.amp);
          for (let x = 2; x <= W; x += 2) {
            const y = w.y + Math.sin(x * w.freq + w.phase) * w.amp
                         + Math.sin(x * w.freq * 2.1 + w.phase * 0.8) * w.amp * 0.28;
            ctx.lineTo(x, y);
          }
          ctx.strokeStyle = `rgba(${INK},${w.op})`;
          ctx.lineWidth = w.lw;
          ctx.stroke();
        }
      };
    }

    // 4 — Wandering paths
    function animWander(seed) {
      const r = mkRng(seed);
      const W = canvas.width, H = canvas.height;
      const trail = document.createElement('canvas');
      trail.width = W; trail.height = H;
      const tc = trail.getContext('2d');
      tc.fillStyle = BG; tc.fillRect(0, 0, W, H);
      const walkers = Array.from({length: 3 + Math.floor(r() * 3)}, () => ({
        x: W * (0.1 + r() * 0.8), y: H * (0.1 + r() * 0.8),
        angle: r() * Math.PI * 2, op: 0.08 + r() * 0.1, lw: 0.4 + r() * 0.7,
      }));
      return () => {
        tc.fillStyle = 'rgba(245,241,234,0.008)';
        tc.fillRect(0, 0, W, H);
        for (const w of walkers) {
          w.angle += (Math.random() - 0.5) * 0.08;
          const nx = w.x + Math.cos(w.angle) * 1.5;
          const ny = w.y + Math.sin(w.angle) * 1.5;
          tc.beginPath();
          tc.moveTo(w.x, w.y);
          tc.lineTo(nx, ny);
          tc.strokeStyle = `rgba(${INK},${w.op})`;
          tc.lineWidth = w.lw;
          tc.stroke();
          w.x = (nx + W) % W;
          w.y = (ny + H) % H;
        }
        ctx.drawImage(trail, 0, 0);
      };
    }

    const ANIMATIONS = [animDrift, animFlow, animRings, animWaves, animWander];

    function startAnimation(seed) {
      if (animId) { cancelAnimationFrame(animId); animId = null; }
      resizeCanvas();
      const type = ((seed % ANIMATIONS.length) + ANIMATIONS.length) % ANIMATIONS.length;
      const draw = ANIMATIONS[type](seed);
      function loop() { draw(); animId = requestAnimationFrame(loop); }
      animId = requestAnimationFrame(loop);
    }

    // ── State ────────────────────────────────────────────────────────────────
    let lastIndex = -1;
    let hintDismissed = false;

    function showPrompt(text, seed) {
      if (!hintDismissed) {
        document.getElementById('kbdHint').classList.add('gone');
        hintDismissed = true;
      }
      const textEl = document.getElementById('promptText');
      const artWrap = document.getElementById('artWrap');
      artWrap.classList.remove('visible');
      textEl.classList.remove('visible');
      const numSeed = typeof seed === 'number' ? seed
        : [...String(seed)].reduce((a, c) => a + c.charCodeAt(0), 0);
      startAnimation(numSeed);
      setTimeout(() => {
        textEl.textContent = text;
        void artWrap.offsetHeight;
        artWrap.classList.add('visible');
        textEl.classList.add('visible');
      }, 80);
    }

    function generateIcebreaker() {
      let index;
      do { index = Math.floor(Math.random() * prompts.length); }
      while (index === lastIndex && prompts.length > 1);
      lastIndex = index;
      showPrompt(prompts[index], index);
    }

    async function generateAIPrompt() {
      const btn = document.getElementById('aiBtn');
      btn.disabled = true;
      btn.textContent = 'thinking...';
      try {
        const res = await fetch('/api/generate-prompt', { method: 'POST' });
        if (!res.ok) throw new Error('api error');
        const { prompt } = await res.json();
        showPrompt(prompt, Date.now());
      } catch (e) {
        generateIcebreaker();
      } finally {
        btn.disabled = false;
        btn.textContent = 'surprise me (ai)';
      }
    }

    // Copy to clipboard on prompt click
    document.getElementById('promptText').addEventListener('click', () => {
      const text = document.getElementById('promptText').textContent;
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        const hint = document.getElementById('copiedHint');
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 1400);
      });
    });

    // Spacebar shortcut
    document.addEventListener('keydown', e => {
      if (e.code === 'Space' && e.target.tagName !== 'BUTTON') {
        e.preventDefault();
        generateIcebreaker();
      }
    });
  </script>
