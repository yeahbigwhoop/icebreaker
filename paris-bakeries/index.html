<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Paris" />
  <title>Paris Guide</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --cream: #f5f0e8; --gold: #c9a84c; --warm: #8b5e3c; --bg: #1a1108;
      --surface: rgba(255,255,255,0.04); --border: rgba(201,168,76,0.14);
      --green: #6fcf97; --red: #e07070;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--cream); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }

    header { padding: 10px 14px; padding-top: max(10px, env(safe-area-inset-top)); background: var(--bg); display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid rgba(201,168,76,0.18); flex-shrink: 0; gap: 10px; }
    .logo { font-size: 16px; font-weight: 700; color: var(--gold); white-space: nowrap; }
    .logo span { color: var(--cream); font-weight: 400; }
    .header-right { display: flex; gap: 8px; align-items: center; }
    .pill { border: none; border-radius: 20px; padding: 7px 13px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
    #locate-btn { background: var(--gold); color: var(--bg); }
    #locate-btn.locating { background: var(--warm); color: var(--cream); }

    /* Weather pill */
    #weather-pill { background: rgba(255,255,255,0.07); color: rgba(245,240,232,0.8); border: 1px solid rgba(255,255,255,0.1); font-size: 13px; min-width: 72px; }
    #weather-pill.rain  { border-color: rgba(100,160,255,0.4); color: #a8c8ff; background: rgba(100,160,255,0.08); }
    #weather-pill.storm { border-color: rgba(255,140,50,0.5);  color: #ffbb77; background: rgba(255,140,50,0.1); }

    /* Weather panel */
    #wx-overlay { position: fixed; inset: 0; z-index: 1999; display: none; }
    #wx-overlay.open { display: block; }
    #wx-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 2000;
      background: #1f1509; border-top: 1px solid rgba(201,168,76,0.3);
      border-radius: 16px 16px 0 0; padding: 20px 18px 36px;
      transform: translateY(100%); transition: transform 0.28s ease;
    }
    #wx-panel.open { transform: translateY(0); }
    .wx-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 16px; }
    .wx-left-emoji { font-size: 48px; line-height: 1; }
    .wx-desc { font-size: 14px; color: rgba(245,240,232,0.55); margin-top: 6px; }
    .wx-right { text-align: right; }
    .wx-temp { font-size: 44px; font-weight: 300; color: var(--cream); line-height: 1; }
    .wx-range { font-size: 12px; color: rgba(245,240,232,0.4); margin-top: 6px; }
    .wx-precip { font-size: 12px; color: rgba(245,240,232,0.4); margin-top: 2px; }
    .wx-divider { border: none; border-top: 1px solid rgba(201,168,76,0.15); margin: 14px 0; }
    .wx-metro-link { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.2); border-radius: 10px; text-decoration: none; color: var(--gold); font-size: 14px; font-weight: 600; }
    .wx-metro-sub { font-size: 11px; color: rgba(245,240,232,0.35); font-weight: 400; margin-top: 2px; }
    .wx-close { display: block; text-align: center; margin-top: 14px; background: none; border: none; color: rgba(245,240,232,0.3); font-size: 13px; cursor: pointer; width: 100%; padding: 4px; }
    .wx-forecast { display: flex; gap: 8px; margin-bottom: 14px; }
    .wx-day-card { flex: 1; background: rgba(255,255,255,0.04); border: 1px solid rgba(201,168,76,0.12); border-radius: 9px; padding: 10px 8px; text-align: center; }
    .wx-day-label { font-size: 10px; color: rgba(245,240,232,0.35); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .wx-day-emoji { font-size: 24px; line-height: 1; margin-bottom: 5px; }
    .wx-day-temp { font-size: 12px; font-weight: 600; color: var(--cream); }
    .wx-day-rain { font-size: 10px; color: rgba(245,240,232,0.3); margin-top: 3px; }

    /* Day banner */
    #day-banner { background: rgba(224,112,112,0.12); border-bottom: 1px solid rgba(224,112,112,0.25); padding: 7px 14px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; }
    #day-banner.hidden { display: none; }
    #day-banner.mild { background: rgba(201,168,76,0.08); border-bottom-color: rgba(201,168,76,0.2); }
    .banner-text { font-size: 12px; color: rgba(245,240,232,0.7); line-height: 1.4; }
    .banner-text strong { color: var(--cream); }
    .banner-dismiss { font-size: 16px; color: rgba(245,240,232,0.3); cursor: pointer; flex-shrink: 0; padding: 2px 4px; }

    #map { flex: 1; min-height: 0; }

    #drawer { background: var(--bg); border-top: 1px solid rgba(201,168,76,0.18); flex-shrink: 0; max-height: 38vh; display: flex; flex-direction: column; }
    #drawer.collapsed { max-height: fit-content; }
    #drawer.collapsed #drawer-body { display: none; }

    #drawer-handle { padding: 9px 13px 7px; cursor: pointer; user-select: none; flex-shrink: 0; }
    .handle-bar { width: 36px; height: 4px; background: rgba(201,168,76,0.25); border-radius: 2px; margin: 0 auto 9px; }

    /* Tab row */
    .tab-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .tabs { display: flex; gap: 5px; }
    .tab { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 5px 10px; font-size: 12px; font-weight: 600; color: rgba(245,240,232,0.5); cursor: pointer; }
    .tab.active { background: rgba(201,168,76,0.16); border-color: var(--gold); color: var(--gold); }
    @keyframes tabPulse { 0%,100% { opacity:0.5; } 50% { opacity:1; } }
    .tab.loading { animation: tabPulse 0.75s ease-in-out infinite; }
    .tab-right { display: flex; align-items: center; gap: 6px; }

    /* Open Now toggle */
    #open-now-btn { background: transparent; border: 1px solid var(--border); border-radius: 14px; padding: 5px 10px; font-size: 11px; font-weight: 600; color: rgba(245,240,232,0.4); cursor: pointer; }
    #open-now-btn.on { background: rgba(111,207,151,0.12); border-color: var(--green); color: var(--green); }

    /* OSM link */
    #osm-link { display: none; font-size: 10px; color: rgba(245,240,232,0.3); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
    #osm-link:hover { color: var(--gold); }

    .drawer-meta { display: flex; align-items: center; justify-content: space-between; }
    #drawer-label { font-size: 10px; font-weight: 700; color: rgba(245,240,232,0.3); letter-spacing: 0.5px; text-transform: uppercase; }
    #item-count { font-size: 10px; color: rgba(245,240,232,0.25); }

    #drawer-body { overflow-y: auto; padding: 4px 12px 12px; -webkit-overflow-scrolling: touch; flex: 1; min-height: 0; }

    /* Cards */
    .item-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; }
    .item-card:active { background: rgba(201,168,76,0.09); }
    .item-card.nearby { border-color: var(--gold); background: rgba(201,168,76,0.06); }
    .item-card.closed-now { opacity: 0.45; }
    .item-card.selected { border-color: rgba(201,168,76,0.55) !important; background: rgba(201,168,76,0.11) !important; opacity: 1 !important; box-shadow: inset 3px 0 0 var(--gold); }
    .item-rating { font-size: 10px; color: var(--gold); opacity: 0.8; flex-shrink: 0; white-space: nowrap; margin-left: auto; padding-left: 6px; }

    .item-icon { font-size: 19px; flex-shrink: 0; margin-top: 1px; line-height: 1; }
    .item-icon.thumbable { width: 40px; height: 40px; border-radius: 7px; overflow: hidden; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; margin-top: 0; flex-shrink: 0; }
    .item-icon.thumbable img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .item-info { flex: 1; min-width: 0; }
    .item-top { display: flex; align-items: baseline; gap: 6px; }
    .item-name { font-size: 13px; font-weight: 600; color: var(--cream); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .open-badge { font-size: 10px; font-weight: 600; flex-shrink: 0; }
    .open-badge.open { color: var(--green); }
    .open-badge.closed { color: var(--red); }
    .sellout-badge { font-size: 10px; font-weight: 600; color: #f0a050; flex-shrink: 0; }
    .soldout-badge { font-size: 10px; font-weight: 600; color: rgba(224,112,112,0.7); flex-shrink: 0; }
    .item-note { font-size: 11px; color: rgba(245,240,232,0.48); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-hours { font-size: 10px; color: rgba(245,240,232,0.28); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-dist { font-size: 12px; font-weight: 600; color: var(--gold); flex-shrink: 0; padding-top: 1px; }
    .item-dist.near { color: var(--green); }

    #status { position: absolute; bottom: calc(38vh + 10px); left: 50%; transform: translateX(-50%); background: rgba(26,17,8,0.93); color: var(--cream); font-size: 13px; padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(201,168,76,0.3); backdrop-filter: blur(8px); z-index: 1000; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.3s; }
    #status.visible { opacity: 1; }

    #loading { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 9999; }
    #loading.hidden { display: none; }
    .spinner { width: 34px; height: 34px; border: 3px solid rgba(201,168,76,0.2); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .load-text { color: var(--gold); font-size: 15px; }

    .leaflet-popup-content-wrapper { background: #1f1509; color: var(--cream); border: 1px solid var(--gold); border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); }
    .leaflet-popup-tip { background: #1f1509; }
    .popup-name { font-weight: 700; font-size: 14px; }
    .popup-note { font-size: 12px; color: rgba(245,240,232,0.55); margin-top: 3px; font-style: italic; }
    .popup-hours { font-size: 11px; color: var(--gold); margin-top: 3px; }
    .popup-dist { font-size: 12px; color: var(--gold); margin-top: 4px; }
    .popup-addr { font-size: 11px; color: rgba(245,240,232,0.35); margin-top: 2px; }

    /* Story mode */
    #story-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: #0e0a04;
      display: flex; flex-direction: column;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    #story-overlay.active { opacity: 1; pointer-events: all; }

    #story-img-wrap {
      flex: 1; position: relative; overflow: hidden;
    }
    #story-img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: opacity 0.3s;
    }
    #story-no-img {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 80px; background: radial-gradient(ellipse at 50% 40%, #2a1a05, #0e0a04);
    }
    #story-progress {
      position: absolute; top: max(14px, env(safe-area-inset-top)); left: 16px; right: 16px;
      display: flex; gap: 4px;
    }
    #story-progress span {
      flex: 1; height: 2px; border-radius: 1px;
      background: rgba(201,168,76,0.25);
      transition: background 0.2s;
    }
    #story-progress span.done { background: var(--gold); }

    #story-close {
      position: absolute; top: max(14px, env(safe-area-inset-top)); right: 14px;
      background: rgba(0,0,0,0.45); color: var(--cream); border: none;
      border-radius: 50%; width: 32px; height: 32px; font-size: 16px;
      cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
    }

    #story-info {
      padding: 18px 18px max(22px, calc(env(safe-area-inset-bottom) + 14px));
      background: linear-gradient(transparent, #0e0a04 20%);
      position: absolute; bottom: 0; left: 0; right: 0;
    }
    #story-icon  { font-size: 22px; margin-bottom: 4px; }
    #story-name  { font-size: 22px; font-weight: 700; color: var(--cream); margin-bottom: 6px; }
    #story-note  { font-size: 13px; color: rgba(245,240,232,0.65); line-height: 1.45; margin-bottom: 8px; }
    #story-meta  { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 12px; }
    #story-map-btn {
      background: var(--gold); color: var(--bg); border: none;
      border-radius: 20px; padding: 9px 20px; font-size: 13px; font-weight: 700;
      cursor: pointer;
    }

    .story-nav {
      position: absolute; top: 0; bottom: 0; width: 44%;
      background: transparent; border: none; cursor: pointer; z-index: 5;
    }
    #story-prev { left: 0; }
    #story-next { right: 0; }
  </style>
</head>
<body>

<div id="wx-overlay" onclick="toggleWxPanel()"></div>
<div id="wx-panel">
  <div class="wx-row">
    <div>
      <div class="wx-left-emoji" id="wp-emoji">🌤️</div>
      <div class="wx-desc" id="wp-desc">Loading Paris weather...</div>
    </div>
    <div class="wx-right">
      <div class="wx-temp" id="wp-temp">--°</div>
      <div class="wx-range" id="wp-range">H: -- · L: --</div>
      <div class="wx-precip" id="wp-precip">Rain chance: --%</div>
    </div>
  </div>
  <hr class="wx-divider">
  <div class="wx-forecast">
    <div class="wx-day-card">
      <div class="wx-day-label">Tomorrow</div>
      <div class="wx-day-emoji" id="wp-d1-emoji">—</div>
      <div class="wx-day-temp" id="wp-d1-temp">—</div>
      <div class="wx-day-rain" id="wp-d1-rain">—</div>
    </div>
    <div class="wx-day-card">
      <div class="wx-day-label" id="wp-d2-label">—</div>
      <div class="wx-day-emoji" id="wp-d2-emoji">—</div>
      <div class="wx-day-temp" id="wp-d2-temp">—</div>
      <div class="wx-day-rain" id="wp-d2-rain">—</div>
    </div>
  </div>
  <a class="wx-metro-link" href="https://www.ratp.fr/information-trafic" target="_blank" onclick="toggleWxPanel()">
    <div>
      <div>🚇 RATP Metro Status</div>
      <div class="wx-metro-sub">Opens live disruption map in browser</div>
    </div>
    <div style="font-size:18px;opacity:0.5">↗</div>
  </a>
  <button class="wx-close" onclick="toggleWxPanel()">Close</button>
</div>

<div id="loading" class="hidden">
  <div style="font-size:40px">🥐</div>
  <div class="load-text">Loading all bakeries...</div>
  <div class="spinner"></div>
</div>

<header>
  <div class="logo">🗺 Paris <span>Guide</span></div>
  <div class="header-right">
    <button id="weather-pill" class="pill" onclick="toggleWxPanel()">--°F</button>
    <button id="locate-btn" class="pill" onclick="locateMe()">📍 Find Me</button>
    <button class="pill" id="story-btn" onclick="openStory()" style="background:rgba(201,168,76,0.12);color:var(--gold);border:1px solid rgba(201,168,76,0.3);">▶ Story</button>
  </div>
</header>

<div id="day-banner" class="hidden">
  <div class="banner-text" id="banner-text"></div>
  <div class="banner-dismiss" onclick="document.getElementById('day-banner').classList.add('hidden')">✕</div>
</div>

<div id="map"></div>
<div id="status"></div>

<div id="drawer">
  <div id="drawer-handle" onclick="toggleDrawer()">
    <div class="handle-bar"></div>
    <div class="tab-row">
      <div class="tabs">
        <div class="tab active" data-cat="all"       onclick="setTab('all',event)">All</div>
        <div class="tab"        data-cat="bakery"    onclick="setTab('bakery',event)">🥐</div>
        <div class="tab"        data-cat="park"      onclick="setTab('park',event)">🌳</div>
        <div class="tab"        data-cat="market"    onclick="setTab('market',event)">🛒</div>
        <div class="tab"        data-cat="curiosity" onclick="setTab('curiosity',event)">✨</div>
      </div>
      <div class="tab-right">
        <span id="osm-link" onclick="toggleOsm(event)">All bakeries ↗</span>
        <button id="open-now-btn" onclick="toggleOpenNow(event)">Open now</button>
      </div>
    </div>
    <div class="drawer-meta">
      <div id="drawer-label">All spots</div>
      <div id="item-count"></div>
    </div>
  </div>
  <div id="drawer-body"></div>
</div>

<script>
// ── Airbnb ────────────────────────────────────────────────────────────────────
const AIRBNB = { lat: 48.8692, lon: 2.3444, addr: "8 Rue Saint-Marc, 75002" };

// ── Wikipedia thumbnail lookup (name → article title) ─────────────────────────
const WIKI = {
  // Bakeries — local assets + Wikipedia fallback for Éric Kayser
  "Du Pain et des Idées":          "local:assets/du pain et des idées.png",
  "Poilâne":                       "local:assets/Boulangerie Poilâne.png",
  "Mamiche":                       ["local:assets/Mamiche.png", "local:assets/Mamiche 2 .png"],
  "Bo&Mie":                        "local:assets/Bo&Mie.png",
  "Maison Landemaine":             "local:assets/Maison Landemaine.png",
  "Gontran Cherrier":              "local:assets/gontran cherrier.png",
  "Le Grenier à Pain":             ["local:assets/le grenier à pain.png", "local:assets/le grenier à pain 2.png"],
  "Éric Kayser":                   "Éric Kayser",
  "Blé Sucré":                     "local:assets/Ble Sucre.png",
  "Terroirs d'Avenir":             "local:assets/Boulangerie Terroir d'Avenir.png",
  "Utopie":                        "local:assets/Boulangerie Utopie.png",
  "Chambelland":                   "local:assets/Chambelland Boulangerie.png",
  "Sain Boulangerie":              ["local:assets/Sain Boulangerie.png", "local:assets/Sain Boulangerie 2.png"],
  "Ten Belles Bread":              "local:assets/Ten Belles Bread.png",
  "Vandermeersch":                 "local:assets/Vandermeersch.png",
  "Liberté":                       ["local:assets/LIBERTÉ.png", "local:assets/LIBERTÉ 2.png"],
  "Des Gâteaux et du Pain":        "local:assets/Des Gâteaux et du Pain.png",
  "Bread & Roses":                 ["local:assets/Bread and Roses.png", "local:assets/Bread and Roses 2.png"],
  "Boulangerie Julien":            ["local:assets/La Boulangerie Julien.png", "local:assets/La Boulangerie Julien 2.png"],
  // Parks
  "Jardin du Luxembourg":      "Jardin du Luxembourg",
  "Jardin des Tuileries":      "Tuileries Garden",
  "Parc Monceau":              "Parc Monceau",
  "Champ de Mars":             "Champ de Mars, Paris",
  "Parc de la Villette":       "Parc de la Villette",
  "Parc des Buttes-Chaumont":  "Buttes-Chaumont",

  "Rue Montorgueil":           "Rue Montorgueil",

  "Galignani":                 "Galignani",
  "Librairie du Pompidou":     "Centre Georges-Pompidou",
  "Passage des Panoramas":     "Passage des Panoramas",
  "Musée des Arts Décoratifs": "Musée des Arts Décoratifs, Paris",
  "Palais de Tokyo":           "Palais de Tokyo",
  "Catacombes de Paris":       "Catacombs of Paris",
  "Abbesses Metro Station":    "Abbesses (Paris Métro)",
  "Arts et Métiers Metro":     "Arts et Métiers (Paris Métro)",
  "Butte aux Cailles":         "Butte-aux-Cailles",
  "Canal Saint-Martin":        "Canal Saint-Martin",
  "Galerie Vivienne":          "Galerie Vivienne",
  "Promenade Plantée":         "Promenade plantée",
  "Trocadéro Esplanade":       "Trocadéro",
  "Pont Saint-Louis":          "Pont Saint-Louis (Paris)",
  "Place Igor Stravinsky":     "Place Igor-Stravinsky",
  "Galerie 1900-2000":         "Surrealism",
  // Static green-dot parks
  "Parc Montsouris":           "Parc Montsouris",
  "Jardin des Plantes":        "Jardin des Plantes",
  "Parc de Bercy":             "Parc de Bercy",
  "Bois de Boulogne":          "Bois de Boulogne",
  "Bois de Vincennes":         "Bois de Vincennes",
  "Parc Floral de Paris":      "Parc Floral de Paris",
  "Square du Vert-Galant":     "Square du Vert-Galant",
  "Parc de Belleville":        "Parc de Belleville",
  "Parc André Citroën":        "Parc André Citroën",
  "Jardins du Trocadéro":      "Jardins du Trocadéro",
  "Jardin du Ranelagh":        "Jardin du Ranelagh",
  "Parc de la Muette":         "Parc de la Muette",
  "Jardin de Reuilly":         "Jardin de Reuilly",
};

function wikiFirst(name) {
  const v = WIKI[name];
  return Array.isArray(v) ? v[0] : (v || '');
}
function wikiAll(name) {
  const v = WIKI[name];
  return Array.isArray(v) ? v : (v ? [v] : []);

// ── Paris time helpers ────────────────────────────────────────────────────────
function parisNow() {
  const d = new Date();
  const p = new Date(d.toLocaleString('en-US', { timeZone: 'Europe/Paris' }));
  return { day: p.getDay(), hour: p.getHours() + p.getMinutes() / 60 };
}

function isOpenNow(item) {
  if (!item.hrs) return null;
  const { day, hour } = parisNow();
  if (item.off && item.off.includes(day)) return false;
  const [open, close] = item.hrs;
  if (open === 0 && close === 24) return true;
  return hour >= open && hour < close;
}

}

// ── Helpers ───────────────────────────────────────────────────────────────────
function distM(a, b) {
  const R = 6371000, r = x => x * Math.PI / 180;
  const dl = r(b[0]-a[0]), dg = r(b[1]-a[1]);
  const x = Math.sin(dl/2)**2 + Math.cos(r(a[0]))*Math.cos(r(b[0]))*Math.sin(dg/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1-x));
}
function fmtDist(m) { const mins = Math.round(m / 80); return mins < 1 ? '< 1 min' : `~${mins} min`; }
function showStatus(msg, dur=3000) {
  const el = document.getElementById('status');
  el.textContent = msg; el.classList.add('visible');
  clearTimeout(el._t); el._t = setTimeout(() => el.classList.remove('visible'), dur);
}
function toggleDrawer() { drawerOpen = !drawerOpen; document.getElementById('drawer').classList.toggle('collapsed', !drawerOpen); }

// ── Audio chime ───────────────────────────────────────────────────────────────
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [[523.25,0],[659.25,0.18],[783.99,0.36]].forEach(([freq,when]) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(0, ctx.currentTime+when);
      g.gain.linearRampToValueAtTime(0.27, ctx.currentTime+when+0.04);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+when+0.6);
      o.start(ctx.currentTime+when); o.stop(ctx.currentTime+when+0.65);
    });
  } catch(e) {}
}

  let base;
  if (osmMode) base = osmItems;
  else if (activeCategory === 'all') base = ALL_ITEMS;
  else base = ALL_ITEMS.filter(b => b.cat === activeCategory);

  if (openNowOnly) base = base.filter(b => isOpenNow(b) !== false);
  return base;
}

  getDisplayItems().forEach(b => {

    const closed = isOpenNow(b) === false;
    const m = L.marker([b.lat, b.lon], { icon: makeIcon(b.icon || '📍', nearby ? 1.2 : 1), opacity: closed ? 0.4 : 1 })
      .addTo(map)
      .bindPopup(() => popupHTML(b), { maxWidth: 220 });
    b._marker = m;
    mapMarkers.push(m);
  });
}

function popupHTML(b) {
  const open = isOpenNow(b);
  const badge = open === true ? '<span style="color:#6fcf97;font-size:11px"> · Open now</span>' : open === false ? '<span style="color:#e07070;font-size:11px"> · Closed</span>' : '';
  const wikiTitle = wikiFirst(b.name);
  const cached = wikiTitle ? wikiCache.get(wikiTitle) : null;
  const thumbHtml = cached
    ? `<img src="${cached.src}" style="width:100%;border-radius:7px;margin-bottom:7px;display:block;max-height:100px;object-fit:cover;">`
    : wikiTitle ? `<div class="popup-thumb-load" data-name="${b.name}" data-wiki="${wikiTitle}"></div>` : '';
  const ratingHtml = b.rating ? `<div style="font-size:11px;color:var(--gold);opacity:0.85;margin-top:3px;">${b.rating}★${b.reviews ? `<span style="opacity:0.5;font-size:10px;"> · ${b.reviews} reviews</span>` : ''}</div>` : '';
  return `${thumbHtml}<div class="popup-name">${b.icon||'📍'} ${b.name}${badge}</div>
    ${ratingHtml}
    ${b.note ? `<div class="popup-note">${b.note}</div>` : ''}
    ${b.hours ? `<div class="popup-hours">🕐 ${b.hours}</div>` : ''}
    ${b.addr ? `<div class="popup-addr">${b.addr}</div>` : ''}
    ${b.dist != null ? `<div class="popup-dist">📍 ${fmtDist(b.dist)} away</div>` : ''}`;
}

function flyTo(lat, lon) {
  map.flyTo([lat, lon], 17, { duration: 0.7 });
  const b = getDisplayItems().find(x => x.lat === lat && x.lon === lon);
  if (b?._marker) b._marker.openPopup();
}

function renderList() {
  const body = document.getElementById('drawer-body');

  const items = [...getDisplayItems()];
  if (userLatLng) {
    items.forEach(b => b.dist = distM([b.lat,b.lon], userLatLng));
    items.sort((a, b) => a.dist - b.dist);
  }

  const catLabels = { all:'all spots', bakery:'bakeries', park:'parks', market:'markets', curiosity:'curiosities' };
  labelEl.textContent = osmMode ? 'all Paris bakeries' : (catLabels[activeCategory] || 'spots');
  countEl.textContent = items.length + ' spots' + (openNowOnly ? ' · open now' : '');

  body.innerHTML = items.slice(0, 80).map(b => {
    const nearby = b.dist && b.dist < 250;
    const open = isOpenNow(b);
    const closedClass = open === false ? 'closed-now' : '';
    const badgeHtml = open === true
      ? `<span class="open-badge open">Open</span>`
      : open === false
      ? `<span class="open-badge closed">Closed</span>`
      : '';
    const { hour } = parisNow();
    const selloutHtml = b.sellsOutHour
      ? hour < b.sellsOutHour
        ? `<span class="sellout-badge">· sells out by ${b.sellsOutHour <= 12 ? b.sellsOutHour + 'am' : (b.sellsOutHour-12)+'pm'}</span>`
        : `<span class="soldout-badge">· may be sold out</span>`
      : '';
    const distStr = b.dist != null ? fmtDist(b.dist) : '';
    const wikiTitle = wikiFirst(b.name);
    return `<div class="item-card ${nearby?'nearby':''} ${closedClass}" data-key="${b.lat},${b.lon}" onclick="selectCard(this,${b.lat},${b.lon})">
      <div class="item-icon${wikiTitle?' thumbable':''}"${wikiTitle?` data-wiki="${wikiTitle}"`:''}>${b.icon||'📍'}</div>
      <div class="item-info">
        <div class="item-top"><div class="item-name">${b.name}</div>${badgeHtml}${selloutHtml}${b.rating ? `<span class="item-rating">${b.rating}★</span>` : ''}</div>
        ${b.note ? `<div class="item-note">${b.note}</div>` : ''}
        ${b.hours ? `<div class="item-hours">🕐 ${b.hours}</div>` : ''}
      </div>
      ${distStr ? `<div class="item-dist ${nearby?'near':''}">${distStr}</div>` : ''}
    </div>`;
  }).join('');
  if (selectedKey) {
    const card = body.querySelector(`[data-key="${selectedKey}"]`);
    if (card) card.classList.add('selected');
  }
  loadThumbnails();
}

function locateMe() {
  const btn = document.getElementById('locate-btn');
  if (!navigator.geolocation) { showStatus('Geolocation not supported'); return; }
  btn.textContent = '⏳ Locating...'; btn.classList.add('locating');
  if (watchId) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(pos => {
    btn.textContent = '📡 Tracking'; btn.classList.remove('locating');
    const { latitude: lat, longitude: lon } = pos.coords;
    userLatLng = [lat, lon];
    if (userMarker) { userMarker.setLatLng([lat, lon]); }
    else { userMarker = L.marker([lat,lon], { icon:userDotIcon(), zIndexOffset:1000 }).addTo(map).bindPopup('You are here'); map.flyTo([lat,lon], 15, { duration:1 }); }
    ALL_ITEMS.forEach(b => b.dist = distM([b.lat,b.lon], userLatLng));
    osmItems.forEach(b => b.dist = distM([b.lat,b.lon], userLatLng));
    // Chime for nearby bakeries
    if (activeCategory === 'bakery' || activeCategory === 'all') {
      getDisplayItems().filter(b => b.cat==='bakery' && b.dist < 200).forEach(b => {
        if (!alertedSet.has(b.name)) {
          alertedSet.add(b.name); playChime();
          showStatus(`${b.icon} ${b.name} — ${fmtDist(b.dist)} away!`, 5000);
        }
      });
      alertedSet.forEach(k => { const b = ALL_ITEMS.find(x=>x.name===k); if (b && b.dist > 350) alertedSet.delete(k); });
    }
    renderList();
  }, err => {
    btn.textContent = '📍 Find Me'; btn.classList.remove('locating');
    showStatus(err.code === 1 ? 'Location permission denied' : 'Could not get location');
  }, { enableHighAccuracy:true, maximumAge:5000 });
}

// ── Weather ───────────────────────────────────────────────────────────────────
function wxEmoji(c) {
  if (c===0) return '☀️'; if (c<=2) return '🌤️'; if (c===3) return '☁️';
  if (c<=48) return '🌫️'; if (c<=55) return '🌦️'; if (c<=67) return '🌧️';
  if (c<=77) return '🌨️'; if (c<=82) return '🌦️'; return '⛈️';
}
function wxDesc(c) {
  if (c===0) return 'Clear skies'; if (c<=2) return 'Partly cloudy'; if (c===3) return 'Overcast';
  if (c<=48) return 'Foggy'; if (c<=55) return 'Drizzle'; if (c<=67) return 'Rain';
  if (c<=77) return 'Snow'; if (c<=82) return 'Showers'; return 'Thunderstorms';
}

async function fetchWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.8566&longitude=2.3522' +
      '&current=temperature_2m,weather_code,precipitation_probability' +
      '&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode,sunrise,sunset' +
      '&temperature_unit=fahrenheit&timezone=Europe%2FParis&forecast_days=3&past_days=1');
    const d = await r.json();
    const cur = d.current, day = d.daily;
    // past_days=1 + forecast_days=3 → indices: 0=yesterday, 1=today, 2=tomorrow, 3=day-after
    const code    = cur.weather_code;
    const temp    = Math.round(cur.temperature_2m);
    const yHi     = Math.round(day.temperature_2m_max[0]);
    const hi      = Math.round(day.temperature_2m_max[1]);
    const lo      = Math.round(day.temperature_2m_min[1]);
    const precip  = day.precipitation_probability_max[1];
    const swing   = hi - yHi;

    // Golden hour & sunset
    const fmtTime = t => t.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit', timeZone:'Europe/Paris' });
    const sunset  = new Date(day.sunset[1]);
    const golden  = new Date(sunset - 45 * 60000);

    const pill = document.getElementById('weather-pill');
    pill.textContent = `${wxEmoji(code)} ${temp}°F`;
    pill.className = `pill ${code >= 95 ? 'storm' : code >= 61 ? 'rain' : ''}`.trim();

    document.getElementById('wp-emoji').textContent  = wxEmoji(code);
    document.getElementById('wp-desc').textContent   = wxDesc(code);
    document.getElementById('wp-temp').textContent   = temp + '°F';
    document.getElementById('wp-range').textContent  = `H: ${hi}° · L: ${lo}° · Rain: ${precip}%`;
    document.getElementById('wp-precip').textContent = `🌅 Sunset ${fmtTime(sunset)} · ✨ golden from ${fmtTime(golden)}`;

    // 2-day forecast cards — daily field is 'weathercode' (no underscore) in Open-Meteo
    const dayCodes = day.weathercode ?? day.weather_code ?? [];
    const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const d3date = day.time?.[3] ? new Date(day.time[3] + 'T12:00:00') : null;
    document.getElementById('wp-d1-emoji').textContent = wxEmoji(dayCodes[2] ?? 0);
    document.getElementById('wp-d1-temp').textContent  = `${Math.round(day.temperature_2m_max[2])}° / ${Math.round(day.temperature_2m_min[2])}°`;
    document.getElementById('wp-d1-rain').textContent  = `Rain ${day.precipitation_probability_max[2]}%`;
    document.getElementById('wp-d2-label').textContent = d3date ? dayNames[d3date.getDay()] : '—';
    document.getElementById('wp-d2-emoji').textContent = wxEmoji(dayCodes[3] ?? 0);
    document.getElementById('wp-d2-temp').textContent  = day.temperature_2m_max[3] != null ? `${Math.round(day.temperature_2m_max[3])}° / ${Math.round(day.temperature_2m_min[3])}°` : '—';
    document.getElementById('wp-d2-rain').textContent  = day.precipitation_probability_max[3] != null ? `Rain ${day.precipitation_probability_max[3]}%` : '—';

    // Banner: significant temp swing (≥5°F from yesterday)
    const banner = document.getElementById('day-banner');
    if (Math.abs(swing) >= 5 && banner.classList.contains('hidden')) {
      const dir = swing > 0 ? '📈 Warmer' : '📉 Cooler';
      document.getElementById('banner-text').innerHTML =
        `<strong>${dir} today</strong> — ${Math.abs(swing)}°F ${swing > 0 ? 'warmer' : 'cooler'} than yesterday. Pack accordingly — high of ${hi}°F.`;
      banner.classList.remove('hidden');
      banner.classList.add('mild');
    }
  } catch(e) {}
}

// ── Wikipedia thumbnails ──────────────────────────────────────────────────────
const wikiCache = new Map(); // title → result | null (fetching) | false (no image)

async function fetchThumb(title) {
  try {
    // Local asset — no network call needed
    if (title.startsWith('local:')) {
      return { src: encodeURI(title.slice(6)), pageUrl: '' };
    }
    // French or English Wikipedia
    const lang = title.startsWith('fr:') ? 'fr' : 'en';
    const t    = title.startsWith('fr:') ? title.slice(3) : title;
    const r = await fetch(`https://${lang}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(t)}&prop=pageimages&pithumbsize=200&format=json&origin=*`);
    const d = await r.json();
    const page = Object.values(d.query.pages)[0];
    const thumb = page?.thumbnail;
    if (!thumb) return null;
    if (thumb.height > thumb.width * 1.3) return null;
    return { src: thumb.source, pageUrl: `https://${lang}.wikipedia.org/wiki/${encodeURIComponent(t.replace(/ /g, '_'))}` };
  } catch { return null; }
}

function applyThumb(el, result) {
  if (!document.contains(el)) return;
  const img = document.createElement('img');
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
  img.alt = '';
  img.onload = () => {
    if (!document.contains(el)) return;
    el.innerHTML = '';
    if (result.pageUrl) {
      const a = document.createElement('a');
      a.href = result.pageUrl;
      a.target = '_blank';
      a.rel = 'noopener';
      a.style.cssText = 'display:block;width:100%;height:100%;line-height:0;';
      a.onclick = ev => ev.stopPropagation();
      a.appendChild(img);
      el.appendChild(a);
    } else {
      el.style.cssText += ';line-height:0;';
      el.appendChild(img);
    }
  };
  img.src = result.src;
}

function loadThumbnails() {
  document.querySelectorAll('.item-icon[data-wiki]').forEach(el => {
    const title = el.dataset.wiki;
    if (wikiCache.has(title)) {
      // Already fetched — apply if we got a result
      const cached = wikiCache.get(title);
      if (cached) applyThumb(el, cached);
      return;
    }
    // Mark as in-flight before fetching so re-renders don't double-fetch
    wikiCache.set(title, null);
    fetchThumb(title).then(result => {
      wikiCache.set(title, result || false);
      if (result) applyThumb(el, result);
    });
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
  if (!localStorage.getItem('sw-welcomed')) {
    navigator.serviceWorker.ready.then(() => {
      localStorage.setItem('sw-welcomed', '1');
      setTimeout(() => showStatus('📶 Saved — works offline', 4500), 1800);
    });
  }
}
if (!navigator.onLine) {
  setTimeout(() => showStatus('📵 Offline — showing cached spots', 5000), 600);
}
window.addEventListener('offline', () => showStatus('📵 Offline — map tiles may be limited', 5000));
window.addEventListener('online',  () => showStatus('📶 Back online', 3000));
map.on('popupopen', e => {
  const el = e.popup.getElement()?.querySelector('.popup-thumb-load');
  if (!el) return;
  const name = el.dataset.name || '';
  const title = el.dataset.wiki;
  const allTitles = name ? wikiAll(name) : (title ? [title] : []);
  if (!allTitles.length) return;

  Promise.all(allTitles.map(t => fetchThumb(t))).then(results => {
    const valid = results.filter(Boolean);
    if (!valid.length) { el.remove(); return; }

    if (valid.length === 1) {
      // Single image — existing fade-in behaviour
      wikiCache.set(allTitles[0], valid[0]);
      const img = document.createElement('img');
      img.style.cssText = 'width:100%;border-radius:7px;margin-bottom:7px;display:block;max-height:110px;object-fit:cover;opacity:0;transition:opacity 0.35s;';
      img.onload = () => {
        el.replaceWith(img);
        requestAnimationFrame(() => { img.style.opacity = '1'; });
        if (e.popup.isOpen()) e.popup.update();
      };
      img.src = valid[0].src;
      return;
    }

    // Multi-image carousel
    let idx = 0;
    const container = document.createElement('div');
    container.style.cssText = 'margin-bottom:7px;';

    const wrap = document.createElement('div');
    wrap.style.cssText = 'position:relative;width:100%;border-radius:7px;overflow:hidden;touch-action:pan-y;';

    const imgEl = document.createElement('img');
    imgEl.style.cssText = 'width:100%;display:block;max-height:110px;object-fit:cover;transition:opacity 0.2s;';

    const dotsEl = document.createElement('div');
    dotsEl.style.cssText = 'display:flex;justify-content:center;gap:5px;padding-top:5px;';

    function setSlide(i, instant) {
      idx = (i + valid.length) % valid.length;
      if (!instant) imgEl.style.opacity = '0';
      imgEl.src = valid[idx].src;
      imgEl.onload = () => {
        imgEl.style.opacity = '1';
        if (e.popup.isOpen()) e.popup.update();
      };
      dotsEl.innerHTML = valid.map((_, j) =>
        `<span style="width:6px;height:6px;border-radius:50%;background:${j===idx?'#c9a84c':'rgba(201,168,76,0.3)'};display:inline-block;cursor:pointer;" onclick="event.stopPropagation()"></span>`
      ).join('');
      // Make dots clickable
      dotsEl.querySelectorAll('span').forEach((s, j) => s.addEventListener('click', ev => { ev.stopPropagation(); setSlide(j, false); }));
    }

    // Touch swipe
    let startX = 0;
    wrap.addEventListener('touchstart', ev => { startX = ev.touches[0].clientX; }, {passive:true});
    wrap.addEventListener('touchend', ev => {
      const dx = ev.changedTouches[0].clientX - startX;
      if (Math.abs(dx) < 30) return;
      setSlide(idx + (dx < 0 ? 1 : -1), false);
    });

    wrap.appendChild(imgEl);
    container.appendChild(wrap);
    container.appendChild(dotsEl);
    el.replaceWith(container);
    setSlide(0, true);
  });
});

function openStory() {
  // Use bakeries in current tab (or all if 'all')
  const items = getDisplayItems().filter(b => b.cat === 'bakery' || activeCategory === 'bakery' || (activeCategory === 'all' && b.cat === 'bakery'));
  storyItems = items.length ? items : getDisplayItems();
  storyIdx = 0;
  document.getElementById('story-overlay').classList.add('active');
  renderStorySlide();
  // Touch swipe for advancing bakeries
  const overlay = document.getElementById('story-overlay');
  overlay._touchX = 0;
}

function closeStory() {
  document.getElementById('story-overlay').classList.remove('active');
}

function storyNav(dir) {
  storyIdx = (storyIdx + dir + storyItems.length) % storyItems.length;
  renderStorySlide();
}

function goStoryOnMap() {
  const b = storyItems[storyIdx];
  if (!b) return;
  closeStory();
  selectCard(
    document.querySelector(`[data-key="${b.lat},${b.lon}"]`) || document.createElement('div'),
    b.lat, b.lon
  );
}

function renderStorySlide() {
  const b = storyItems[storyIdx];
  if (!b) return;

  // Progress dots
  const prog = document.getElementById('story-progress');
  prog.innerHTML = storyItems.map((_, i) => `<span class="${i < storyIdx ? 'done' : ''}"></span>`).join('');

  // Icon + text
  document.getElementById('story-icon').textContent = b.icon || '🥐';
  document.getElementById('story-name').textContent = b.name;
  document.getElementById('story-note').textContent = b.note || '';

  // Status badge
  const open = isOpenNow(b);
  const metaEl = document.getElementById('story-meta');
  metaEl.innerHTML = open === true
    ? `<span style="color:var(--green);font-weight:700">● Open now</span>`
    : open === false
    ? `<span style="color:var(--red);font-weight:700">● Closed</span>`
    : '';
  if (b.rating) metaEl.innerHTML += `<span style="color:var(--gold);font-weight:600">${b.rating}★</span><span style="color:rgba(245,240,232,0.35);font-size:11px">${b.reviews ? b.reviews+' reviews' : ''}</span>`;
  if (b.hours) metaEl.innerHTML += `<span style="color:rgba(245,240,232,0.45)">${b.hours}</span>`;

  // Image
  const imgEl = document.getElementById('story-img');
  const noimgEl = document.getElementById('story-no-img');
  const images = wikiAll(b.name);
  if (images.length) {
    fetchThumb(images[0]).then(result => {
      if (result) {
        imgEl.style.opacity = '0';
        imgEl.style.display = 'block';
        noimgEl.style.display = 'none';
        imgEl.onload = () => { imgEl.style.opacity = '1'; };
        imgEl.src = result.src;
      } else {
        imgEl.style.display = 'none';
        noimgEl.style.display = 'flex';
        noimgEl.textContent = b.icon || '🥐';
      }
    });
  } else {
    imgEl.style.display = 'none';
    noimgEl.style.display = 'flex';
    noimgEl.textContent = b.icon || '🥐';
  }
}

plotAirbnb();
plotMarkers();
renderList();
initDayBanner();
fetchWeather();
</script>

<div id="story-overlay">
  <div id="story-progress"></div>
  <button id="story-close" onclick="closeStory()">✕</button>
  <div id="story-img-wrap">
    <img id="story-img" alt="" />
    <div id="story-no-img"></div>
  </div>
  <div id="story-info">
    <div id="story-icon"></div>
    <div id="story-name"></div>
    <div id="story-note"></div>
    <div id="story-meta"></div>
    <button id="story-map-btn" onclick="goStoryOnMap()">View on map ›</button>
  </div>
  <button class="story-nav" id="story-prev" onclick="storyNav(-1)"></button>
  <button class="story-nav" id="story-next" onclick="storyNav(1)"></button>
</div>
</body>
</html>
